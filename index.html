// advance date by months/weeks
function advanceDate(base,freq,i){
  const p=base.split('-').map(Number);
  let [yr,mo,dy]=[p[0],p[1]-1,p[2]];
  if(freq==='mensal')mo+=i;
  else if(freq==='bimestral')mo+=i*2;
  else if(freq==='trimestral')mo+=i*3;
  else if(freq==='semestral')mo+=i*6;
  else if(freq==='anual')yr+=i;
  else if(freq==='quinzenal'){const t=new Date(yr,mo,dy+i*15);yr=t.getFullYear();mo=t.getMonth();dy=t.getDate();}
  else if(freq==='semanal'){const t=new Date(yr,mo,dy+i*7);yr=t.getFullYear();mo=t.getMonth();dy=t.getDate();}
  const n=new Date(yr,mo,dy);
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}

    if(!cfg.cw_token){toast('Configure o token do Cardápio Web primeiro','error');return;}

      const url=`/api/pedidos?token=${encodeURIComponent(cfg.cw_token)}&date=${dateFilter}`;
      const res=await fetch(url,{signal:AbortSignal.timeout(20000),cache:'no-store'});
      if(!res.ok){setSyncStatus('Erro '+res.status);setSyncing(false);return;}
      const list=await res.json();
      const arr=Array.isArray(list)?list:[];
      // Save to Supabase
      if(arr.length>0){
        const rows=arr.map(p=>({
          user_id:uid,
          pedido_id:String(p.display_id||p.displayId||p.id),
          source_id:String(p.id),
          cliente:(p.customer?.name||p.customer?.nome||p.clienteNome||'—'),

        await sb.from('pedidos_cw').upsert(rows,{onConflict:'user_id,source_id'});
        // Auto-gerar lançamentos financeiros para pedidos entregues

async function autoGerarLancamentos(uid,pedidos,contas,formasPag,force=false){
  if(!pedidos||!pedidos.length)return;
  // Buscar lançamentos já gerados
  const{data:jaGerados}=await sb.from('lancamentos').select('pedido_id').eq('user_id',uid).not('pedido_id','is',null);
  const geradosSet=new Set((jaGerados||[]).map(x=>x.pedido_id));
  // Buscar contas do user se não passadas
  if(!contas||!contas.length){
    const{data:c}=await sb.from('contas_bancarias').select('*').eq('user_id',uid);
    contas=c||[];
  }
  if(!formasPag||!formasPag.length){
    const{data:f}=await sb.from('formas_pagamento').select('*').eq('user_id',uid);
    formasPag=f||[];
  }

  const novosLanc=[];
  const pedidosGerados=[];

  pedidos.forEach(p=>{
    const pid=String(p.id||p.display_id||p.displayId||'');
    if(!force&&geradosSet.has(pid))return;
    const status=(p.status||p.situacao||'');
    if(!force&&status!=='DELIVERED'&&status!=='Entregue')return;
    const pags=p.payments||p.pagamentos||[];
    if(!pags.length){
      // sem pagamentos, usa total
      const dt=(p.created_at||p.createdAt||'').split('T')[0]||TODAY();
      novosLanc.push({user_id:uid,tipo:'receita',desc:`Pedido #${p.display_id||p.id} (${dt})`,valor:Number(p.total||p.totalAmount||0),data:dt,venc:dt,data_pag:dt,pago:true,pedido_id:pid,categoria:'Vendas',obs:'Auto-gerado pelo Moneyy'});
      pedidosGerados.push(pid);
      return;
    }
    let mudou=false;
    pags.forEach(pg=>{
      const pmKey=(pg.payment_method||'').toLowerCase();
      // pular pagamentos online iFood
      if(pmKey==='ifood'||pmKey==='online_credit_card'||(pg.payment_type||'').toLowerCase()==='online')return;
      const pmNome=PM_MAP[pmKey]||pmKey;
      const forma=formasPag.find(f=>f.status==='ativa'&&(f.nome||'').toLowerCase().includes(pmNome.toLowerCase().split(' ')[0]));
      let valor=Number(pg.value||pg.total||pg.valor||pg.prepaid||pg.paid_value||0);
      if(!valor&&pags.length===1)valor=Number(p.total||p.totalAmount||0);
      if(!valor)return;
      const taxa=forma?.taxa_pct?valor*(forma.taxa_pct/100):0;
      const valorLiq=parseFloat((valor-taxa).toFixed(2));
      const diasRec=forma?.dias||0;
      const dtBase=(p.created_at||p.createdAt||'').split('T')[0]||TODAY();
      const dtRec=advanceDate(dtBase,'semanal',0); // same day default
      let dtRecFinal=dtBase;
      if(diasRec>0){const d=new Date(dtBase+'T12:00:00');d.setDate(d.getDate()+diasRec);dtRecFinal=d.toISOString().split('T')[0];}
      // Encontrar conta
      const contaId=forma?.conta_id||contas.find(c=>{
        const n=(c.nome||'').toLowerCase();
        if(pmNome.toLowerCase().includes('pix'))return n.includes('pix')||n.includes('nubank')||c.tipo==='Digital';
        if(pmNome.toLowerCase().includes('dinheiro'))return c.tipo==='Caixa'||n.includes('caixa');
        return n.includes('stone')||n.includes('cielo')||c.tipo==='Maquininha'||c.tipo==='Digital';
      })?.id||contas[0]?.id;
      if(!contaId)return;
      novosLanc.push({
        user_id:uid,tipo:'receita',
        desc:`Pedido #${p.display_id||p.id} — ${forma?.nome||pmNome} (${dtBase})`,
        valor:valorLiq,data:dtRecFinal,venc:dtRecFinal,data_pag:diasRec===0?dtRecFinal:'',
        pago:diasRec===0,conta_id:contaId,categoria:'Vendas',
        obs:`Auto-gerado. Bruto: ${F(valor)} · Taxa: ${F(taxa)}`,
        pedido_id:pid,
      });
      if(taxa>0){
        novosLanc.push({
          user_id:uid,tipo:'despesa',
          desc:`Taxa ${forma?.nome||pmNome} — Pedido #${p.display_id||p.id}`,
          valor:taxa,data:dtRecFinal,venc:dtRecFinal,data_pag:dtRecFinal,
          pago:true,conta_id:contaId,categoria:'Taxa Cartão',
          obs:'Auto-gerado.',pedido_id:pid,
        });
      }
      mudou=true;
    });
    if(mudou)pedidosGerados.push(pid);
  });

  if(novosLanc.length){
    await sb.from('lancamentos').insert(novosLanc);
    // marcar pedidos como gerados
    if(pedidosGerados.length){
      await sb.from('pedidos_cw').update({lanc_gerado:true}).in('source_id',pedidosGerados).eq('user_id',uid);
    }
  }
}

      React.createElement(SC,{label:'A Pagar',val:F(aPagar),color:'#dc2626',sub:(lancamentos||[]).filter(l=>l.tipo==='despesa'&&!l.pago).length+' pendentes'})

// ── LANÇAMENTOS (receitas + despesas + parcelado + recorrente) ──
function FinLancamentos({uid,db,reload,setM}){
  const{lancamentos,contas}=db;
  const[fil,setFil]=useState('todos');
  const[mes,setMes]=useState(TODAY().slice(0,7));
  const hoje=TODAY();

  const list=useMemo(()=>{
    let r=lancamentos||[];
    r=r.filter(l=>l.data?.slice(0,7)===mes);
    if(fil==='receitas')r=r.filter(l=>l.tipo==='receita');
    else if(fil==='despesas')r=r.filter(l=>l.tipo==='despesa');
    else if(fil==='pendentes')r=r.filter(l=>!l.pago);
    else if(fil==='pagos')r=r.filter(l=>l.pago);
    return r.sort((a,b)=>a.data>b.data?-1:1);
  },[lancamentos,fil,mes]);

  const recTotal=list.filter(l=>l.tipo==='receita').reduce((s,l)=>s+Number(l.valor),0);
  const despTotal=list.filter(l=>l.tipo==='despesa').reduce((s,l)=>s+Number(l.valor),0);
  const vencidos=(lancamentos||[]).filter(l=>!l.pago&&l.venc&&l.venc<hoje);

  const novo=(tipo)=>setM({title:(tipo==='receita'?'+ Nova Receita':'+ Nova Despesa'),body:React.createElement(LancForm,{uid,tipo,db,reload,close:()=>setM(null)})});

  const pagar_=l=>setM({title:'Confirmar Pagamento',body:
    React.createElement('div',null,
      React.createElement('div',{style:{background:'#f8f9fc',borderRadius:11,padding:'13px',marginBottom:14}},
        React.createElement('div',{style:{fontWeight:700,marginBottom:4,color:'#0f172a'}},l.desc),
        React.createElement('div',{style:{fontSize:21,fontWeight:800,color:l.tipo==='receita'?'#15803d':'#dc2626'}},F(l.valor)),
        React.createElement('div',{style:{fontSize:12,color:'#aaa',marginTop:3}},(l.categoria||'—')+' · '+FD(l.venc))
      ),
      React.createElement(Sel,{label:'Conta',v:l.conta_id||contas[0]?.id||'',set:()=>{},opts:(contas||[]).map(c=>({v:c.id,l:c.nome+' — '+F(c.saldo)}))}),
      React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}},
        React.createElement('button',{style:C.ghost,onClick:()=>setM(null)},'Cancelar'),
        React.createElement('button',{style:C.bgrn,onClick:async()=>{
          const contaId=l.conta_id||contas[0]?.id;
          await sb.from('lancamentos').update({pago:true,data_pag:TODAY()}).eq('id',l.id);
          // atualizar saldo
          if(contaId){
            const conta=(contas||[]).find(c=>c.id===contaId);
            if(conta){
              const novoSaldo=l.tipo==='receita'?Number(conta.saldo)+Number(l.valor):Number(conta.saldo)-Number(l.valor);
              await sb.from('contas_bancarias').update({saldo:novoSaldo}).eq('id',contaId);
            }
          }
          toast('Confirmado!',false,true);reload();setM(null);
        }},'✓ Confirmar')
      )
    )
  });

  const excluir=async(l)=>{
    if(!confirm('Excluir lançamento "'+l.desc+'"?'))return;
    // Verificar se tem grupo
    if(l.grupo_id){
      const opcao=confirm('Este lançamento faz parte de um grupo.\nOK = excluir todos do grupo\nCancelar = excluir só este');
      if(opcao){await sb.from('lancamentos').delete().eq('grupo_id',l.grupo_id).eq('user_id',uid);}
      else{await sb.from('lancamentos').delete().eq('id',l.id);}
    }else{
      await sb.from('lancamentos').delete().eq('id',l.id);
    }
    toast('Excluído!',false,true);reload();
  };

  // Meses disponíveis
  const mesesDisp=useMemo(()=>{
    const s=new Set((lancamentos||[]).map(l=>l.data?.slice(0,7)).filter(Boolean));
    const hoje=TODAY().slice(0,7);
    s.add(hoje);
    return [...s].sort().reverse().slice(0,12);
  },[lancamentos]);

  return React.createElement('div',null,
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:13,marginBottom:16}},
      React.createElement(SC,{label:'Receitas',val:F(recTotal),color:'#15803d',icon:'📈'}),
      React.createElement(SC,{label:'Despesas',val:F(despTotal),color:'#dc2626',icon:'📉'}),
      React.createElement(SC,{label:'Resultado',val:F(recTotal-despTotal),color:recTotal-despTotal>=0?'#15803d':'#dc2626',icon:'✨'}),
      React.createElement(SC,{label:'Vencidos',val:vencidos.length,color:vencidos.length>0?'#dc2626':'#15803d',sub:vencidos.length>0?'⚠ Atenção!':'OK',icon:'⚠'})
    ),
    // Ações + filtros
    React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14,flexWrap:'wrap',gap:8}},
      React.createElement('div',{style:{display:'flex',gap:5,flexWrap:'wrap',alignItems:'center'}},
        React.createElement('select',{style:{...C.sel,marginBottom:0,width:'auto',padding:'6px 12px',fontSize:12},value:mes,onChange:e=>setMes(e.target.value)},
          mesesDisp.map(m=>React.createElement('option',{key:m,value:m},new Date(m+'-01').toLocaleDateString('pt-BR',{month:'long',year:'numeric'})))
        ),
        [['todos','Todos'],['receitas','Receitas'],['despesas','Despesas'],['pendentes','Pendentes'],['pagos','Pagos']].map(([v,l])=>
          React.createElement('button',{key:v,onClick:()=>setFil(v),style:{padding:'6px 13px',borderRadius:20,fontSize:12,fontWeight:600,background:fil===v?'#2563eb':'#f4f6fa',color:fil===v?'#fff':'#666'}},l)
        )
      ),
      React.createElement('div',{style:{display:'flex',gap:7}},
        React.createElement('button',{style:{...C.bsm,background:'linear-gradient(135deg,#15803d,#166534)'},onClick:()=>novo('receita')},'+ Receita'),
        React.createElement('button',{style:C.bsm,onClick:()=>novo('despesa')},'+ Despesa')
      )
    ),
    // Tabela
    React.createElement('div',{style:{...C.card,padding:0}},
      React.createElement(Tbl,{cols:['Data','Descrição','Categoria','Conta','Tipo','Parcela','Valor','Status',''],
        rows:list.map(l=>{
          const venc=!l.pago&&l.venc&&l.venc<hoje;
          const contaNome=(contas||[]).find(c=>c.id===l.conta_id)?.nome||'—';
          return React.createElement(TR,{key:l.id,cells:[
            FD(l.data),
            React.createElement('div',null,
              React.createElement('div',{style:{fontWeight:600,fontSize:13}},l.desc),
              l.obs&&React.createElement('div',{style:{fontSize:10,color:'#bbb',marginTop:1}},l.obs.slice(0,50))
            ),
            React.createElement(Badge,{t:l.categoria||'—',c:'gray'}),
            React.createElement('span',{style:{fontSize:11,color:'#aaa'}},contaNome),
            React.createElement(Badge,{t:l.tipo==='receita'?'Receita':'Despesa',c:l.tipo==='receita'?'green':'red'}),
            l.parcela?React.createElement('span',{style:{fontSize:11,color:'#7c3aed',fontWeight:600,background:'rgba(124,58,237,0.07)',padding:'2px 7px',borderRadius:8}},l.recorrente?'🔄':'📦'+' '+l.parcela}):React.createElement('span',{style:{color:'#eee'}},'—'),
            React.createElement('span',{style:{fontWeight:700,color:l.tipo==='receita'?'#15803d':'#dc2626'}},(l.tipo==='receita'?'+':'-')+F(l.valor)),
            React.createElement(Badge,{t:venc?'Vencido':l.pago?'Pago':'Pendente',c:venc?'red':l.pago?'green':'amber'}),
            React.createElement('div',{style:{display:'flex',gap:4}},
              !l.pago&&React.createElement('button',{style:{...C.gsm,fontSize:11,background:'rgba(22,163,74,0.08)',color:'#15803d'},onClick:e=>{e.stopPropagation();pagar_(l);}},'✓'),
              React.createElement('button',{style:{...C.gsm,fontSize:11,background:'rgba(220,38,38,0.07)',color:'#dc2626'},onClick:e=>{e.stopPropagation();excluir(l);}},'×')
            ),
          ]});
        }),
        empty:'Nenhum lançamento neste período'
      })

// ── FORM LANÇAMENTO (com parcelado e recorrente) ──
function LancForm({uid,tipo,db,reload,close,initial}){
  const{contas}=db;
  const[desc,setDesc]=useState(initial?.desc||'');
  const[valor,setValor]=useState(initial?.valor||'');
  const[cat,setCat]=useState(initial?.categoria||(tipo==='receita'?'Vendas':'Aluguel'));
  const[contaId,setContaId]=useState(initial?.conta_id||contas?.[0]?.id||'');
  const[data,setData]=useState(initial?.data||TODAY());
  const[venc,setVenc]=useState(initial?.venc||TODAY());
  const[pago,setPago]=useState(initial?.pago??false);
  const[obs,setObs]=useState(initial?.obs||'');
  const[tipoLanc,setTipoLanc]=useState('unico'); // unico|parcelado|recorrente
  const[numParc,setNumParc]=useState(2);
  const[freqParc,setFreqParc]=useState('mensal');
  const[numRep,setNumRep]=useState(12);
  const[freqRec,setFreqRec]=useState('mensal');
  const[ld,setLd]=useState(false);

  const CATS_REC=['Vendas','Serviços','Outros'];
  const CATS_DESP=['Aluguel','Salários','Energia','Água','Internet','Marketing','Combustível','Contador','Manutenção','Fornecedores','Taxa Cartão','Outros'];
  const cats=tipo==='receita'?CATS_REC:CATS_DESP;
  const FREQS=[{v:'semanal',l:'Semanal'},{v:'quinzenal',l:'Quinzenal'},{v:'mensal',l:'Mensal'},{v:'bimestral',l:'Bimestral'},{v:'trimestral',l:'Trimestral'},{v:'semestral',l:'Semestral'},{v:'anual',l:'Anual'}];

  const salvar=async()=>{
    if(!desc||!valor){toast('Preencha descrição e valor',true);return;}
    setLd(true);
    const v=parseFloat(String(valor).replace(',','.'));
    const base={user_id:uid,tipo,desc,valor:v,categoria:cat,conta_id:contaId||null,data,venc,pago,obs};

    let rows=[];
    if(tipoLanc==='parcelado'){
      const grupoId=uid();
      for(let i=0;i<numParc;i++){
        const dt=advanceDate(venc,freqParc,i);
        rows.push({...base,id:undefined,data:dt,venc:dt,data_pag:i===0&&pago?dt:'',pago:i===0?pago:false,grupo_id:grupoId,parcela:`${i+1}/${numParc}`,desc:`${desc} (${i+1}/${numParc})`});
      }
    }else if(tipoLanc==='recorrente'){
      const grupoId=uid();
      for(let i=0;i<numRep;i++){
        const dt=advanceDate(venc,freqRec,i);
        rows.push({...base,id:undefined,data:dt,venc:dt,data_pag:i===0&&pago?dt:'',pago:i===0?pago:false,grupo_id:grupoId,recorrente:freqRec,parcela:`${i+1}/${numRep}`});
      }
    }else{
      rows=[{...base,data_pag:pago?TODAY():''}];
    }

    const{error}=await sb.from('lancamentos').insert(rows);
    if(error){toast('Erro: '+error.message,true);setLd(false);return;}
    // Atualizar saldo da conta se pago
    if(pago&&contaId){
      const conta=(contas||[]).find(c=>c.id===contaId);
      if(conta){
        const delta=tipo==='receita'?v:-v;
        await sb.from('contas_bancarias').update({saldo:Number(conta.saldo)+delta}).eq('id',contaId);
      }
    }
    toast((tipoLanc==='unico'?'Lançamento':tipoLanc==='parcelado'?numParc+' parcelas':numRep+' ocorrências')+' criado(s)!',false,true);
    reload();close();setLd(false);
  };

  const isRec=tipo==='receita';
  return React.createElement('div',null,
    // Tipo de lançamento
    React.createElement('div',{style:{display:'flex',gap:5,marginBottom:16}},
      [['unico','Único'],['parcelado','Parcelado 📦'],['recorrente','Recorrente 🔄']].map(([v,l])=>
        React.createElement('button',{key:v,onClick:()=>setTipoLanc(v),style:{flex:1,padding:'8px',borderRadius:9,fontSize:12,fontWeight:600,background:tipoLanc===v?(isRec?'#16a34a':'#2563eb'):'#f4f6fa',color:tipoLanc===v?'#fff':'#888'}},l)
      )
    ),
    React.createElement(Inp,{label:'Descrição',v:desc,set:setDesc,ph:isRec?'Ex: Receita de vendas':'Ex: Aluguel escritório'}),
    React.createElement(G2,null,
      React.createElement(Inp,{label:'Valor (R$)',v:valor,set:setValor,type:'number',step:'0.01',ph:'0.00'}),
      React.createElement(Sel,{label:'Categoria',v:cat,set:setCat,opts:cats})
    ),
    React.createElement(G2,null,
      React.createElement(Sel,{label:'Conta',v:contaId,set:setContaId,opts:[{v:'',l:'— Sem conta —'},...(contas||[]).map(c=>({v:c.id,l:c.nome}))]}),
      React.createElement(Inp,{label:tipoLanc==='unico'?'Data':'Data Inicial',v:venc,set:setVenc,type:'date'})
    ),
    // Parcelado
    tipoLanc==='parcelado'&&React.createElement('div',{style:{background:'rgba(124,58,237,0.05)',borderRadius:11,padding:'12px',marginBottom:13}},
      React.createElement('div',{style:{fontSize:11,color:'#7c3aed',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:10}},'📦 Configurar Parcelas'),
      React.createElement(G2,null,
        React.createElement(Inp,{label:'Nº de Parcelas',v:numParc,set:v=>setNumParc(Math.max(2,parseInt(v)||2)),type:'number',min:2,max:120}),
        React.createElement(Sel,{label:'Frequência',v:freqParc,set:setFreqParc,opts:FREQS})
      ),
      React.createElement('div',{style:{fontSize:12,color:'#aaa'}},`${numParc} parcelas de ${F(parseFloat(valor||0))} = ${F(parseFloat(valor||0)*numParc)} total`)
    ),
    // Recorrente
    tipoLanc==='recorrente'&&React.createElement('div',{style:{background:'rgba(37,99,235,0.05)',borderRadius:11,padding:'12px',marginBottom:13}},
      React.createElement('div',{style:{fontSize:11,color:'#2563eb',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:10}},'🔄 Configurar Recorrência'),
      React.createElement(G2,null,
        React.createElement(Inp,{label:'Nº de Repetições',v:numRep,set:v=>setNumRep(Math.max(1,parseInt(v)||12)),type:'number',min:1,max:120}),
        React.createElement(Sel,{label:'Frequência',v:freqRec,set:setFreqRec,opts:FREQS})
      ),
      React.createElement('div',{style:{fontSize:12,color:'#aaa'}},`${numRep} repetições ${FREQS.find(f=>f.v===freqRec)?.l||''} a partir de ${FD(venc)}`)
    ),
    React.createElement(Inp,{label:'Observação',v:obs,set:setObs,ph:'Opcional'}),
    React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:14}},
      React.createElement('input',{type:'checkbox',checked:pago,onChange:e=>setPago(e.target.checked),id:'chk-pago',style:{width:16,height:16,accentColor:'#2563eb'}}),
      React.createElement('label',{htmlFor:'chk-pago',style:{fontSize:13,color:'#555',cursor:'pointer'}},isRec?'Já recebido':'Já pago')
    ),

      React.createElement('div',{style:{fontSize:28,fontWeight:800,color:'#0f172a',letterSpacing:'-1px'}},F(total))
    ),
    React.createElement('div',{style:{display:'flex',justifyContent:'flex-end',marginBottom:14}},React.createElement('button',{style:C.btn,onClick:novo},'+ Nova Conta')),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(230px,1fr))',gap:13}},
      (contas||[]).map(c=>React.createElement('div',{key:c.id,style:{...C.card,borderLeft:`4px solid ${c.cor||'#2563eb'}`}},
        React.createElement('div',{style:{display:'flex',justifyContent:'space-between',marginBottom:10}},
          React.createElement('div',null,React.createElement('div',{style:{fontWeight:700,fontSize:14,color:'#0f172a'}},c.nome),React.createElement('div',{style:{fontSize:11,color:'#bbb',marginTop:2}},c.tipo+(c.banco?' · '+c.banco:''))),
          React.createElement('div',{style:{width:9,height:9,borderRadius:'50%',background:c.cor||'#2563eb',marginTop:4}})
        ),
        React.createElement('div',{style:{fontSize:21,fontWeight:800,color:'#0f172a',letterSpacing:'-0.5px'}},F(c.saldo))
      ))
    )
  );
}

function ContaForm({uid,reload,close}){
  const[nome,setNome]=useState('');const[tipo,setTipo]=useState('Digital');const[banco,setBanco]=useState('');const[saldo,setSaldo]=useState('');const[cor,setCor]=useState('#2563eb');const[ld,setLd]=useState(false);
  return React.createElement('div',null,
    React.createElement(Inp,{label:'Nome',v:nome,set:setNome,ph:'Ex: Nubank PJ'}),
    React.createElement(G2,null,
      React.createElement(Sel,{label:'Tipo',v:tipo,set:setTipo,opts:['Digital','Corrente','Poupança','Caixa','Maquininha']}),
      React.createElement(Inp,{label:'Banco',v:banco,set:setBanco,ph:'Ex: Nubank'})
    ),
    React.createElement(G2,null,
      React.createElement(Inp,{label:'Saldo Inicial (R$)',v:saldo,set:setSaldo,type:'number',ph:'0.00'}),
      React.createElement('div',null,React.createElement(Lbl,{c:'Cor'}),React.createElement('div',{style:{display:'flex',gap:7,flexWrap:'wrap',marginBottom:13}},['#2563eb','#16a34a','#dc2626','#d97706','#7c3aed','#0891b2','#ea580c'].map(c=>React.createElement('div',{key:c,onClick:()=>setCor(c),style:{width:22,height:22,borderRadius:'50%',background:c,cursor:'pointer',border:cor===c?'3px solid #0f172a':'3px solid transparent',transition:'border 0.12s'}}))))
    ),
    React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
      React.createElement('button',{style:C.ghost,onClick:close},'Cancelar'),
      React.createElement('button',{style:C.btn,onClick:async()=>{
        if(!nome){toast('Informe o nome',true);return;}
        setLd(true);
        await sb.from('contas_bancarias').insert({user_id:uid,nome,tipo,banco,saldo:parseFloat(saldo)||0,cor,ativo:true});
        toast('Conta criada!',false,true);reload();close();setLd(false);
      }},ld?React.createElement(Spin):'Criar')
    )
  );
}

// ── APP ──
function App(){
  const[user,setUser]=useState(null);const[page,setPage]=useState('pedidos');
  const[db,setDb]=useState({pedidos_cw:[],estoque:[],contas:[],receber:[],lancamentos:[],movs:[],formas_pagamento:[]});
  const[cfg,setCfg]=useState({cw_token:'',uid:null});
  const[modal,setModal]=useState(null);const[col,setCol]=useState(false);const[loading,setLoading]=useState(false);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{if(session)setUser(session.user);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
    return()=>subscription.unsubscribe();
  },[]);

  const reload=useCallback(async()=>{
    if(!user)return;setLoading(true);
    const uid=user.id;
    const[ped,est,con,rec,lanc,mov,fps,cfgr]=await Promise.all([
      sb.from('pedidos_cw').select('*').eq('user_id',uid).order('data_pedido',{ascending:false}).limit(500),
      sb.from('estoque').select('*').eq('user_id',uid).order('nome'),
      sb.from('contas_bancarias').select('*').eq('user_id',uid).eq('ativo',true).order('criado_em'),
      sb.from('contas_receber').select('*').eq('user_id',uid).order('criado_em',{ascending:false}),
      sb.from('lancamentos').select('*').eq('user_id',uid).order('data',{ascending:false}).limit(1000),
      sb.from('movimentacoes').select('*').eq('user_id',uid).order('data_movimentacao',{ascending:false}).limit(500),
      sb.from('formas_pagamento').select('*').eq('user_id',uid),
      sb.from('config_usuario').select('*').eq('user_id',uid),
    ]);
    // seed contas
    let contas=con.data||[];
    if(contas.length===0){
      await sb.from('contas_bancarias').insert([
        {user_id:uid,nome:'Nubank PJ',tipo:'Digital',banco:'Nubank',saldo:0,cor:'#7c3aed',ativo:true},
        {user_id:uid,nome:'Stone',tipo:'Maquininha',banco:'Stone',saldo:0,cor:'#16a34a',ativo:true},
        {user_id:uid,nome:'Caixa',tipo:'Caixa',banco:'',saldo:0,cor:'#d97706',ativo:true},
      ]);
      const{data:nc}=await sb.from('contas_bancarias').select('*').eq('user_id',uid);
      contas=nc||[];
    }
    // seed formas_pagamento
    let fps2=fps.data||[];
    if(fps2.length===0){
      const fSeed=[
        {user_id:uid,nome:'PIX',taxa_pct:0,dias:0,status:'ativa'},
        {user_id:uid,nome:'Cartão Crédito',taxa_pct:3.26,dias:1,status:'ativa'},
        {user_id:uid,nome:'Cartão Débito',taxa_pct:1.39,dias:1,status:'ativa'},
        {user_id:uid,nome:'Dinheiro',taxa_pct:0,dias:0,status:'ativa'},
      ];
      const{data:nf}=await sb.from('formas_pagamento').insert(fSeed).select();
      fps2=nf||[];
    }
    setDb({pedidos_cw:ped.data||[],estoque:est.data||[],contas,receber:rec.data||[],lancamentos:lanc.data||[],movs:mov.data||[],formas_pagamento:fps2});
    // cfg
    const cfgMap={};(cfgr.data||[]).forEach(r=>{cfgMap[r.chave]=r.valor;});
    setCfg({...cfgMap,cw_token:cfgMap.cw_token||'',uid});
    setLoading(false);
  },[user]);

  useEffect(()=>{if(user)reload();},[user]);
  const logout=async()=>{await sb.auth.signOut();setUser(null);};

  if(!user)return React.createElement(React.Fragment,null,React.createElement(Auth,{onLogin:setUser}),React.createElement(Toasts));
  if(loading)return React.createElement('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f5f5f7',flexDirection:'column',gap:10}},React.createElement(Spin),React.createElement('div',{style:{color:'#bbb',fontSize:13,marginTop:6}},'Carregando Moneyy...'));

  const uid=user.id;
  const PAGES={
    pedidos:()=>React.createElement(Pedidos,{uid,db,reload,setM:setModal,cfg,setCfg}),
    estoque:()=>React.createElement(Estoque,{uid,db,reload,setM:setModal}),
    financeiro:()=>React.createElement(Financeiro,{uid,db,reload,setM:setModal}),
  };
  const PC=PAGES[page]||PAGES.pedidos;

  return React.createElement(React.Fragment,null,
    React.createElement('div',{style:{display:'flex',height:'100vh',background:'#f5f5f7',overflow:'hidden'}},
      React.createElement(Sidebar,{page,setPage,user,logout,col,setCol}),
      React.createElement('main',{style:{flex:1,overflow:'auto',background:'#f5f5f7'}},React.createElement(PC))
    ),
    React.createElement(Modal,{m:modal,close:()=>setModal(null)}),
    React.createElement(Toasts)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
