function advanceDate(base,freq,i){
  const[yr0,mo0,dy0]=base.split('-').map(Number);
  let yr=yr0,mo=mo0-1,dy=dy0;
  if(freq==='semanal'){const t=new Date(yr,mo,dy+i*7);yr=t.getFullYear();mo=t.getMonth();dy=t.getDate();}
  else if(freq==='quinzenal'){const t=new Date(yr,mo,dy+i*15);yr=t.getFullYear();mo=t.getMonth();dy=t.getDate();}
  else if(freq==='mensal'){mo+=i;}
  else if(freq==='bimestral'){mo+=i*2;}
  else if(freq==='trimestral'){mo+=i*3;}
  else if(freq==='semestral'){mo+=i*6;}
  else if(freq==='anual'){yr+=i;}
  const n=new Date(yr,mo,dy);
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}

// ── CATEGORIAS FINANCEIRAS (PLANO DE CONTAS) ──
const GRUPOS_PADRAO=[
  {grupo:'1 - RECEITAS',tipo:'receita',subs:['1.1 Vendas de Produtos','1.2 Prestação de Serviços','1.3 Receitas Financeiras','1.4 Outras Receitas']},
  {grupo:'2 - CUSTOS',tipo:'despesa',subs:['2.1 CMV - Custo das Mercadorias','2.2 Matérias-Primas','2.3 Embalagens','2.4 Mão de Obra Direta']},
  {grupo:'3 - DESPESAS OPERACIONAIS',tipo:'despesa',subs:['3.1 Pessoal e Salários','3.2 Aluguel','3.3 Energia e Água','3.4 Internet e Comunicação','3.5 Marketing e Publicidade','3.6 Contador e Assessoria','3.7 Manutenção','3.8 Combustível e Transporte']},
  {grupo:'4 - DESPESAS FINANCEIRAS',tipo:'despesa',subs:['4.1 Taxas Bancárias','4.2 Taxas de Cartão','4.3 Juros e Multas','4.4 IOF']},
  {grupo:'5 - IMPOSTOS E TAXAS',tipo:'despesa',subs:['5.1 Simples Nacional','5.2 ICMS','5.3 PIS/COFINS','5.4 IRPJ/CSLL','5.5 Outros Impostos']},
  {grupo:'6 - INVESTIMENTOS',tipo:'despesa',subs:['6.1 Equipamentos','6.2 Reformas e Benfeitorias','6.3 Software e Sistemas','6.4 Outros Investimentos']},
];

function FinCategorias({uid,db,reload,setM}){
  const{categorias_fin}=db;
  const[expandido,setExpandido]=React.useState({});
  const toggle=(g)=>setExpandido(p=>({...p,[g]:!p[g]}));

  const novaCategoria=(grupo,tipo)=>setM({title:'Nova Categoria',body:React.createElement(CatForm,{uid,grupo,tipo,reload,close:()=>setM(null)})});

  const excluirCat=async(id,nome)=>{
    if(!confirm('Excluir categoria "'+nome+'"?'))return;
    await sb.from('categorias_fin').delete().eq('id',id);
    toast('Excluída!',false,true);reload();
  };

  // Agrupa categorias customizadas por grupo
  const catsPorGrupo={};
  (categorias_fin||[]).forEach(c=>{
    if(!catsPorGrupo[c.grupo])catsPorGrupo[c.grupo]=[];
    catsPorGrupo[c.grupo].push(c);
  });

  return React.createElement(PW,{title:'Plano de Contas',sub:'Categorias financeiras para classificação dos lançamentos',
    actions:[React.createElement('button',{key:'n',style:{background:'#dc2626',color:'#fff',padding:'8px 16px',borderRadius:9,fontSize:13,fontWeight:600,border:'none',cursor:'pointer'},onClick:()=>novaCategoria('','despesa')},'+ Nova Categoria')]},
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}},
      GRUPOS_PADRAO.map(g=>{
        const catsCustom=catsPorGrupo[g.grupo]||[];
        const exp=expandido[g.grupo]!==false; // aberto por default
        return React.createElement('div',{key:g.grupo,style:{background:'#fff',borderRadius:14,boxShadow:'0 1px 8px rgba(0,0,0,0.07)',overflow:'hidden'}},
          // Header do grupo
          React.createElement('div',{
            onClick:()=>toggle(g.grupo),
            style:{display:'flex',alignItems:'center',justifyContent:'space-between',padding:'14px 16px',cursor:'pointer',borderBottom:exp?'1px solid #f5f5f5':'none',background:g.tipo==='receita'?'#f0fdf4':'#fff5f5'}
          },
            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
              React.createElement('div',{style:{width:8,height:8,borderRadius:'50%',background:g.tipo==='receita'?'#16a34a':'#dc2626',flexShrink:0}}),
              React.createElement('span',{style:{fontWeight:700,fontSize:13,color:'#111'}},g.grupo)
            ),
            React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
              React.createElement('button',{
                onClick:e=>{e.stopPropagation();novaCategoria(g.grupo,g.tipo);},
                style:{fontSize:11,color:g.tipo==='receita'?'#16a34a':'#dc2626',background:'transparent',border:'none',cursor:'pointer',fontWeight:600}
              },'+ Add'),
              React.createElement('span',{style:{fontSize:12,color:'#ccc',transition:'transform 0.2s',display:'inline-block',transform:exp?'rotate(90deg)':'rotate(0deg)'}},'›')
            )
          ),
          // Subcategorias padrão + customizadas
          exp&&React.createElement('div',{style:{padding:'8px 0'}},
            // Padrão (read-only)
            g.subs.map(s=>React.createElement('div',{key:s,style:{display:'flex',alignItems:'center',padding:'7px 16px',borderBottom:'1px solid #fafafa'}},
              React.createElement('span',{style:{fontSize:11,color:'#888',marginRight:8}}),'',
              React.createElement('span',{style:{fontSize:13,color:'#555',flex:1}},s),
              React.createElement('span',{style:{fontSize:10,color:'#ddd',fontWeight:600,letterSpacing:'1px'}},'PADRÃO')
            )),
            // Customizadas
            catsCustom.map(c=>React.createElement('div',{key:c.id,style:{display:'flex',alignItems:'center',padding:'7px 16px',borderBottom:'1px solid #fafafa',background:'#fafeff'}},
              React.createElement('span',{style:{fontSize:11,color:'#2563eb',marginRight:8}}),'',
              React.createElement('span',{style:{fontSize:13,color:'#111',flex:1,fontWeight:500}},c.nome),
              React.createElement('button',{onClick:()=>excluirCat(c.id,c.nome),style:{fontSize:11,color:'#dc2626',background:'#fee2e2',border:'none',borderRadius:6,padding:'2px 8px',cursor:'pointer',fontWeight:600}},'×')
            ))
          )
        );
      })
    )
  );
}

function CatForm({uid,grupo,tipo,reload,close}){
  const[nome,setNome]=React.useState('');
  const[grp,setGrp]=React.useState(grupo||GRUPOS_PADRAO[0].grupo);
  const[tip,setTip]=React.useState(tipo||'despesa');
  const[ld,setLd]=React.useState(false);
  const inpS={width:'100%',background:'#f5f5f5',border:'none',borderRadius:10,padding:'10px 13px',fontSize:13,marginBottom:13,color:'#111'};
  const lbS={fontSize:10,color:'#aaa',fontWeight:600,letterSpacing:'1.5px',textTransform:'uppercase',display:'block',marginBottom:6};
  return React.createElement('div',null,
    React.createElement('label',{style:lbS},'Nome da Categoria'),
    React.createElement('input',{style:inpS,type:'text',placeholder:'Ex: 3.9 Outras despesas operacionais',value:nome,onChange:e=>setNome(e.target.value)}),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}},
      React.createElement('div',null,
        React.createElement('label',{style:lbS},'Tipo'),
        React.createElement('select',{style:inpS,value:tip,onChange:e=>setTip(e.target.value)},
          React.createElement('option',{value:'receita'},'Receita'),
          React.createElement('option',{value:'despesa'},'Despesa')
        )
      ),
      React.createElement('div',null,
        React.createElement('label',{style:lbS},'Grupo'),
        React.createElement('select',{style:inpS,value:grp,onChange:e=>setGrp(e.target.value)},
          GRUPOS_PADRAO.map(g=>React.createElement('option',{key:g.grupo,value:g.grupo},g.grupo))
        )
      )
    ),
    React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
      React.createElement('button',{style:{background:'#f5f5f5',color:'#555',padding:'9px 16px',borderRadius:10,fontSize:13,border:'none',cursor:'pointer'},onClick:close},'Cancelar'),
      React.createElement('button',{style:{background:'#dc2626',color:'#fff',padding:'9px 20px',borderRadius:10,fontSize:13,fontWeight:600,border:'none',cursor:'pointer'},onClick:async()=>{
        if(!nome){toast('Informe o nome',true);return;}
        setLd(true);
        await sb.from('categorias_fin').insert({user_id:uid,nome,grupo:grp,tipo:tip});
        toast('Categoria criada!',false,true);reload();close();setLd(false);
      }},ld?'...':`Criar Categoria`)
    )
  );
}


function ContaForm({uid,reload,close}){
  const[nome,setNome]=useState('');const[tipo,setTipo]=useState('Digital');const[banco,setBanco]=useState('');const[saldo,setSaldo]=useState('');const[cor,setCor]=useState('#dc2626');const[ld,setLd]=useState(false);

    ),

// ── APP ──
function App(){
  const[user,setUser]=useState(null);const[page,setPage]=useState('pedidos');
  const[db,setDb]=useState({pedidos:[],estoque:[],contas:[],receber:[],pagar:[],movs:[],lancamentos:[],categorias_fin:[]});
  const[modal,setModal]=useState(null);const[col,setCol]=useState(false);const[loading,setLoading]=useState(false);

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{if(session)setUser(session.user);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
    return()=>subscription.unsubscribe();
  },[]);

  const reload=useCallback(async()=>{
    if(!user)return;
    setLoading(true);
    const uid=user.id;
    const[ped,est,con,rec,pag,mov,lanc,catfin]=await Promise.all([
      sb.from('pedidos').select('*').eq('user_id',uid).order('criado_em',{ascending:false}),
      sb.from('estoque').select('*').eq('user_id',uid).order('nome'),
      sb.from('contas_bancarias').select('*').eq('user_id',uid).eq('ativo',true).order('criado_em'),
      sb.from('contas_receber').select('*').eq('user_id',uid).order('criado_em',{ascending:false}),
      sb.from('contas_pagar').select('*').eq('user_id',uid).order('vencimento'),
      sb.from('movimentacoes').select('*').eq('user_id',uid).order('data_movimentacao',{ascending:false}),
      sb.from('lancamentos').select('*').eq('user_id',uid).order('data',{ascending:false}).limit(500),
      sb.from('categorias_fin').select('*').eq('user_id',uid).order('nome'),
    ]);
    const contas=con.data||[];
    if(contas.length===0){
      await sb.from('contas_bancarias').insert([
        {user_id:uid,nome:'Nubank PJ',tipo:'Digital',banco:'Nubank',saldo:0,cor:'#8b5cf6',ativo:true},
        {user_id:uid,nome:'Caixa',tipo:'Caixa',banco:'',saldo:0,cor:'#f59e0b',ativo:true},
      ]);
      const{data:nc}=await sb.from('contas_bancarias').select('*').eq('user_id',uid);
      setDb({pedidos:ped.data||[],estoque:est.data||[],contas:nc||[],receber:rec.data||[],pagar:pag.data||[],movs:mov.data||[],lancamentos:lanc.data||[],categorias_fin:catfin.data||[]});
    }else{
      setDb({pedidos:ped.data||[],estoque:est.data||[],contas,receber:rec.data||[],pagar:pag.data||[],movs:mov.data||[],lancamentos:lanc.data||[],categorias_fin:catfin.data||[]});
    }
    setLoading(false);
  },[user]);

  useEffect(()=>{if(user)reload();},[user]);

  const logout=async()=>{await sb.auth.signOut();setUser(null);};

  if(!user)return React.createElement(React.Fragment,null,React.createElement(Auth,{onLogin:setUser}),React.createElement(Toasts));
  if(loading)return React.createElement('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f8f8f8',flexDirection:'column',gap:10}},React.createElement(Spin),React.createElement('div',{style:{color:'#bbb',fontSize:13,marginTop:6}},'Carregando...'));

  const uid=user.id;
  const PAGES={
    pedidos:()=>React.createElement(Pedidos,{uid,db,reload,setM:setModal}),
    estoque:()=>React.createElement(Estoque,{uid,db,reload,setM:setModal}),
    fin_visao:()=>React.createElement(FinVisao,{uid,db,reload,setM:setModal}),
    fin_lancamentos:()=>React.createElement(FinLancamentos,{uid,db,reload,setM:setModal}),
    fin_receber:()=>React.createElement(FinReceber,{uid,db,reload,setM:setModal}),
    fin_pagar:()=>React.createElement(FinPagar,{uid,db,reload,setM:setModal}),
    fin_movs:()=>React.createElement(FinMovs,{uid,db,reload,setM:setModal}),
    fin_contas:()=>React.createElement(FinContas,{uid,db,reload,setM:setModal}),
    fin_categorias:()=>React.createElement(FinCategorias,{uid,db,reload,setM:setModal}),
  };
  const PC=PAGES[page]||PAGES.pedidos;

  return React.createElement(React.Fragment,null,
    React.createElement('div',{style:{display:'flex',height:'100vh',background:'#f4f4f5',overflow:'hidden'}},
      React.createElement(Sidebar,{page,setPage,user,logout,col,setCol}),
      React.createElement('main',{style:{flex:1,overflow:'auto',background:'#f4f4f5'}},React.createElement(PC))
    ),
    React.createElement(Modal,{m:modal,close:()=>setModal(null)}),
    React.createElement(Toasts)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
