// Calcula distância em km entre 2 coordenadas (Haversine)
function haversine(lat1,lon1,lat2,lon2){ const R=6371;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)*Math.sin(dLat/2)+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

// Ordena paradas pelo vizinho mais próximo (nearest neighbor TSP)
function otimizarRota(pedidos,baseLat,baseLon){ if(!pedidos.length)return[];
  const restantes=[...pedidos];
  const rota=[];
  let lat=baseLat,lon=baseLon;
  while(restantes.length){ let melhorIdx=0,melhorDist=Infinity;
    restantes.forEach((p,i)=>{ const addr=p.raw?.delivery_address||{};
      const pLat=parseFloat(addr.latitude||0);
      const pLon=parseFloat(addr.longitude||0);
      if(!pLat||!pLon)return;
      const d=haversine(lat,lon,pLat,pLon);
      if(d<melhorDist){melhorDist=d;melhorIdx=i;} });
    const prox=restantes.splice(melhorIdx,1)[0];
    rota.push({...prox,distancia:melhorDist});
    const addr=prox.raw?.delivery_address||{};
    lat=parseFloat(addr.latitude||baseLat);
    lon=parseFloat(addr.longitude||baseLon); }
  return rota;
}

// Distribui pedidos entre N entregadores equilibrando distância total
function distribuirPedidos(pedidos,entregadores,baseLat,baseLon){ if(!entregadores.length||!pedidos.length)return{};

  // Pedidos com coordenadas válidas
  const comCoord=pedidos.filter(p=>{ const a=p.raw?.delivery_address||{};
    return parseFloat(a.latitude||0)&&parseFloat(a.longitude||0); });
  const semCoord=pedidos.filter(p=>{ const a=p.raw?.delivery_address||{};
    return !parseFloat(a.latitude||0)||!parseFloat(a.longitude||0); });

  // Distribui por proximidade geográfica usando clustering simples
  const grupos={};
  entregadores.forEach(e=>grupos[e.id]=[]);

  if(comCoord.length){ // Atribui cada pedido ao entregador cuja última posição está mais próxima
    const posAtual={};
    entregadores.forEach(e=>{posAtual[e.id]={lat:baseLat,lon:baseLon};});

    comCoord.forEach(p=>{ const addr=p.raw?.delivery_address||{};
      const pLat=parseFloat(addr.latitude);
      const pLon=parseFloat(addr.longitude);

      // Encontra entregador com menor carga + distância
      let melhorE=entregadores[0].id;
      let melhorScore=Infinity;
      entregadores.forEach(e=>{ const pos=posAtual[e.id];
        const dist=haversine(pos.lat,pos.lon,pLat,pLon);
        const carga=grupos[e.id].length;
        const score=dist+(carga*2); // penaliza quem já tem mais pedidos
        if(score<melhorScore){melhorScore=score;melhorE=e.id;} });

      grupos[melhorE].push(p);
      posAtual[melhorE]={lat:pLat,lon:pLon}; }); }

  // Distribui sem coord em round-robin
  semCoord.forEach((p,i)=>{ const e=entregadores[i%entregadores.length];
    grupos[e.id].push(p); });

  // Otimiza rota de cada entregador
  const resultado={};
  entregadores.forEach(e=>{ resultado[e.id]=otimizarRota(grupos[e.id],baseLat,baseLon); });
  return resultado;
}

function MapaEntregas({pedidosEntrega,pedidosEntregues,entregadores,rotas,BASE_LAT,BASE_LON,COR,uid,setBaseLat,setBaseLon}){ React.useEffect(()=>{window._setBaseLat=setBaseLat;window._setBaseLon=setBaseLon;return()=>{window._setBaseLat=null;window._setBaseLon=null;};},[setBaseLat,setBaseLon]);

  const[rotasReais,setRotasReais]=React.useState({});
  const[carregandoRotas,setCarregandoRotas]=React.useState(false);

    const map=L.map(mapRef.current,{zoomControl:true,scrollWheelZoom:true}).setView([BASE_LAT,BASE_LON],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{ attribution:'© OpenStreetMap',maxZoom:19 }).addTo(map);
    mapObjRef.current=map;
    return()=>{if(mapObjRef.current){mapObjRef.current.remove();mapObjRef.current=null;}}; },[]);

  // Busca a geometria real da rota pelas ruas via OSRM (gratuito, sem API key)
  React.useEffect(()=>{ const entregadoresAtivos=(entregadores||[]).filter(e=>e.ativo);
    if(entregadoresAtivos.length===0){setRotasReais({});return;}

    let cancelado=false;
    setCarregandoRotas(true);

    const buscarTodas=async()=>{ const novasRotas={};
      for(const e of entregadoresAtivos){ const rota=rotas[e.id]||[];
        if(rota.length===0)continue;
        const pontos=[[BASE_LON,BASE_LAT],...rota.map(p=>{ const addr=p.raw&&p.raw.delivery_address||{};
          const lat=parseFloat(addr.latitude);const lon=parseFloat(addr.longitude);
          return lat&&lon?[lon,lat]:null; }).filter(Boolean)];
        if(pontos.length<2)continue;
        try{ const coordsStr=pontos.map(p=>p[0]+','+p[1]).join(';');
          const url='https://router.project-osrm.org/route/v1/driving/'+coordsStr+'?overview=full&geometries=geojson';
          const res=await fetch(url);
          const data=await res.json();
          if(data.routes&&data.routes[0]){ const coords=data.routes[0].geometry.coordinates.map(c=>[c[1],c[0]]); // [lon,lat]->[lat,lon]
            novasRotas[e.id]={path:coords,distanciaKm:data.routes[0].distance/1000,duracaoMin:data.routes[0].duration/60}; } }catch(err){ /* sem rota */ } }
      if(!cancelado)setRotasReais(novasRotas);
      setCarregandoRotas(false); };
    buscarTodas();
    return()=>{cancelado=true;}; },[rotas,entregadores,BASE_LAT,BASE_LON]);

  React.useEffect(()=>{ const map=mapObjRef.current;
    if(!map)return;
    markersRef.current.forEach(m=>m.remove());
    markersRef.current=[];

    const baseIcon=L.divIcon({className:'',html:'<div style="background:#111;color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:18px;box-shadow:0 3px 12px rgba(0,0,0,0.4);border:3px solid #fff;cursor:move" title="Arraste para mover">🏠</div>',iconSize:[36,36],iconAnchor:[18,18]});
    const baseM=L.marker([BASE_LAT,BASE_LON],{icon:baseIcon,draggable:true}).addTo(map);
    baseM.bindPopup('<b>🏠 Confeitaria</b><br>Ponto de saída<br><small>Arraste para reposicionar</small>');
    baseM.on('dragend',function(e){ const pos=e.target.getLatLng();
      localStorage.setItem('base_lat_'+uid,String(pos.lat));
      localStorage.setItem('base_lon_'+uid,String(pos.lng));
      if(window._setBaseLat)window._setBaseLat(pos.lat);
      if(window._setBaseLon)window._setBaseLon(pos.lng); });
    markersRef.current.push(baseM);

    const entregadoresAtivos=(entregadores||[]).filter(e=>e.ativo);
    const pedParaEnt={};
    entregadoresAtivos.forEach(e=>{(rotas[e.id]||[]).forEach(p=>{pedParaEnt[p.id]=e;});});

    const allPed=[...pedidosEntrega,...pedidosEntregues];
    allPed.forEach(p=>{ const addr=p.raw&&p.raw.delivery_address||{};
      const lat=parseFloat(addr.latitude);
      const lon=parseFloat(addr.longitude);
      if(!lat||!lon)return;

      const ent=pedParaEnt[p.id];
      const cor=ent?(COR[entregadoresAtivos.indexOf(ent)%COR.length]):'#6b7280';
      const isEntregue=p.status==='delivered'||p.status==='closed';
      const bgCor=isEntregue?'#16a34a':cor;

      const icon=L.divIcon({className:'', html:'<div style="background:'+bgCor+';color:#fff;border-radius:8px;padding:3px 7px;font-size:11px;font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,0.25);border:2px solid #fff;white-space:nowrap">'+(isEntregue?'✓ ':'')+'#'+p.pedido_id+'</div>', iconSize:[null,null],iconAnchor:[0,0] });

function buildDREHierarchy(periodo, tipo, prefixo, receitaBruta, Linha, noBold=false, indentOffset=0, showEmpty=false, catsFin=[]){ // Get all lançamentos matching this prefix
  // Include custom categories whose grupo starts with this prefix
  const prefCod=prefixo.split(' ')[0];
  const customNames=new Set((catsFin||[]).filter(c=>{const g=(c.grupo||'').split(' ')[0];return g===prefCod||g.startsWith(prefCod+'.');}).map(c=>c.nome));
  const lancItems=periodo.filter(l=>(tipo===null||l.tipo===tipo)&&((l.categoria||'').startsWith(prefixo)||customNames.has(l.categoria)));
  if(!lancItems.length)return[];

  // Forma pag → plano de contas mapping for receitas
  const FORMA_TO_CAT={ 'pix':'3.1.1 Pix','dinheiro':'3.1.2 Dinheiro', 'cartao credito':'3.1.3 Cartão de Crédito','cartão crédito':'3.1.3 Cartão de Crédito','cartao de credito':'3.1.3 Cartão de Crédito', 'cartao debito':'3.1.4 Cartão de Débito','cartão débito':'3.1.4 Cartão de Débito','cartao de debito':'3.1.4 Cartão de Débito', 'ifood':'3.1.5 iFood','ifood online':'3.1.5 iFood','i food':'3.1.5 iFood', 'a definir':'3.1.6 Outras Formas de Pagamento' };
  const normF=s=>(s||'').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').trim();

  // Sum by exact category (with forma_pag fallback for receitas)
  const bycat={};
  lancItems.forEach(l=>{ let k=l.categoria||'Sem categoria';
    // If categoria is a parent (not specific enough), use forma_pag mapping
    if(tipo==='receita'&&l.forma_pag){ const mapped=FORMA_TO_CAT[normF(l.forma_pag)];
      if(mapped&&k.startsWith(prefixo))k=mapped; }
    bycat[k]=(bycat[k]||0)+Number(l.valor||0); });

  // Build hierarchy from PLANO_CONTAS matching this prefix
  // For receitas: include nivel 1 (parent like 3.1). For despesas: skip nivel 1 (already shown as header)
  const hierItems=PLANO_CONTAS.filter(p=>p.cod&&p.cod.startsWith(prefixo.split(' ')[0])&&p.nivel>=2);
  const rows=[];

  // Helper: sum all lançamentos under a node
  const sumNode=(cod)=>Object.entries(bycat).reduce((s,[k,v])=>{ const catCod=(k.split(' ')[0]||'');
    return s+(catCod===cod||catCod.startsWith(cod+'.')?v:0); },0);
  const isReceita=tipo==='receita';

  hierItems.forEach(item=>{ const total=sumNode(item.cod);
    // For receitas nivel 1, always show if any children have values
    const hasChildren=Object.keys(bycat).some(k=>{ const cod=(k.split(' ')[0]||'');
      return cod===item.cod||cod.startsWith(item.cod+'.'); });
    if(total===0&&!hasChildren&&!showEmpty)return;
    const indent=(isReceita?item.nivel+1:item.nivel)+indentOffset;
    rows.push(React.createElement(Linha,{key:item.cod, label:item.nome,valor:isReceita?total:-total, bold:!noBold&&(isReceita?item.nivel===1:item.nivel===2),noBorder:!noBold&&!isReceita&&item.nivel===2,isDespesa:!isReceita,indent, pct:receitaBruta>0?total/receitaBruta*100:0 })); });

  // Build finalRows with custom categories interleaved at correct positions
  const finalRows=[];

  const pushCustomChildren=(parentNome,depth)=>{ const children=(catsFin||[]).filter(c=>(c.grupo||'')===parentNome||(c.grupo||'').split(' ')[0]===parentNome.split(' ')[0]&&(c.grupo||'')!==parentNome);
    // More precise: match by exact group name
    const prefCode=parentNome.split(' ')[0];
    const exact=(catsFin||[]).filter(c=>{ const g=(c.grupo||'').trim();
      // Match by exact name OR by code prefix (e.g., '4.2 ...' matches parentKey starting with '4.2 ')
      return g===parentNome.trim()||g.startsWith(prefCode+' ')||g===prefCode; });
    exact.forEach(cc=>{ const v=bycat[cc.nome]||0;
      if(v===0&&!showEmpty)return;
      finalRows.push(React.createElement(Linha,{key:'c_'+cc.nome, label:cc.nome,valor:isReceita?v:-v,isDespesa:!isReceita, bold:!noBold&&!isReceita&&depth===2,noBorder:!isReceita&&depth===2, indent:depth+indentOffset, pct:receitaBruta>0&&v>0?v/receitaBruta*100:undefined }));
      pushCustomChildren(cc.nome,depth+1); }); };

  rows.forEach(row=>{ finalRows.push(row);
    const item=hierItems.find(p=>p.cod===row.key);
    if(item){ // Add custom children of this PLANO_CONTAS item
      const parentKey=item.cod+' '+item.nome;
      pushCustomChildren(parentKey,item.nivel+1); } });

  // Add custom children of nivel 1 items (filtered out of hierItems by nivel>=2)
  PLANO_CONTAS.filter(p=>p.cod&&p.cod.startsWith(prefCod)&&p.nivel===1).forEach(parentItem=>{ pushCustomChildren(parentItem.cod+' '+parentItem.nome,parentItem.nivel+1); });

  // Add bycat items not matched by hierarchy or catsFin
  Object.entries(bycat).forEach(([k,v])=>{ const cod=k.split(' ')[0]||'';
    const inHier=hierItems.some(p=>p.cod===cod);
    const inCats=(catsFin||[]).some(c=>c.nome===k);
    if(!inHier&&!inCats){ finalRows.push(React.createElement(Linha,{key:k,label:k.replace(/^\d+(\.\d+)*\s*/,''),valor:isReceita?v:-v,isDespesa:!isReceita,indent:2+indentOffset,pct:receitaBruta>0?v/receitaBruta*100:0})); } });
  return finalRows;
}

  };

    naoCancelados.forEach(p=>{ const itens=((p.raw&&p.raw.items)||p.itens||[]).filter(it=>!isCancelledItem(it));
      itens.forEach(it=>{
        const nomeBruto=(it.name||it.nome||'Sem nome').trim();
        const normN=s=>(s||'').trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/[-_\s]+/g,' ').trim();
        const nLow=normN(nomeBruto);

  const totalLucroProd=totalValProd-totalCustoProd;

  return React.createElement(PW,{title:'Análise de Produtos',sub:'Quantidade vendida e faturamento por produto',

async function importarLancamentos(uid, arquivo, contas, reload, onDone){ const reader = new FileReader();
  reader.onload = async (e) => { try { const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(!rows.length){toast('Arquivo vazio',true);return;}

      const mapeiaData = (v) => { if(!v)return null;
        const s = String(v).trim();
        // formato YYYY-MM-DD
        if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
        // formato DD/MM/YYYY
        if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){const[d,m,y]=s.split('/');return y+'-'+m+'-'+d;}
        // numero serial do excel
        if(!isNaN(s)){const d=new Date((+s-25569)*86400000);return d.toISOString().split('T')[0];}
        return null; };

      const lancToInsert = rows.map(r => ({ user_id: uid, tipo:     (String(r['Tipo']||'despesa')).toLowerCase().includes('rec')?'receita':'despesa', descricao:String(r['Descricao']||r['Descrição']||r['descricao']||'Sem descricao'), valor:    parseFloat(String(r['Valor']||0).replace(',','.'))||0, categoria:String(r['Categoria']||r['categoria']||''), forma_pag:String(r['Forma Pagto']||r['Forma de Pagamento']||''), data:     mapeiaData(r['Data']||r['data'])||TODAY(), venc:     mapeiaData(r['Vencimento']||r['vencimento'])||mapeiaData(r['Data']||r['data'])||TODAY(), data_pag: mapeiaData(r['Data Pagto']||r['Data Pagamento'])||null, pago:     String(r['Pago']||'').toLowerCase()==='sim'||String(r['Pago']||'')==='true', obs:      String(r['Obs']||r['Observacao']||r['Observação']||''), conta_id: null // conta por nome abaixo
})).filter(l=>l.descricao&&l.descricao.length>0&&l.valor>0);

      // Tentar mapear conta por nome
      lancToInsert.forEach((l,i) => { const nomeConta = String(rows[i]['Conta']||'').toLowerCase();
        if(nomeConta){ const c = (contas||[]).find(c=>(c.nome||'').toLowerCase().includes(nomeConta)||nomeConta.includes((c.nome||'').toLowerCase()));
          if(c)l.conta_id = c.id; } });

      if(!lancToInsert.length){toast('Nenhum lancamento valido encontrado',true);return;}
      const {error} = await sb.from('lancamentos').insert(lancToInsert);
      if(error){toast('Erro: '+error.message,true);return;}
      toast(lancToInsert.length+' lancamentos importados!',false,true);
      reload();
      onDone(); } catch(err){ toast('Erro ao processar arquivo: '+err.message,true); } };
  reader.readAsArrayBuffer(arquivo);
}

function ProducaoForm({uid,db,reload,close,fichaIdInicial}){ const{fichas,estoque}=db;
  const[fichaId,setFichaId]=React.useState(fichaIdInicial||'');
  const[qtd,setQtd]=React.useState('1');
  const[data,setData]=React.useState(TODAY());

  const[bulkOpen,setBulkOpen]=React.useState(false);
  const[bulkSel,setBulkSel]=React.useState({});
  const[bulkBusca,setBulkBusca]=React.useState('');
  const[ld,setLd]=React.useState(false);

  const ficha=(fichas||[]).find(f=>f.id===fichaId);
  const qtdN=parseFloat(qtd)||0;

  React.useEffect(()=>{ if(!fichaId){setIngs([]);return;}
    sb.from('ficha_ingredientes').select('*').eq('ficha_id',fichaId).then(({data})=>setIngs(data||[])); },[fichaId]);

  const custoUnitario=ings.reduce((s,i)=>s+Number(i.quantidade||0)*Number(i.custo_unit||0),0);
  const custoTotal=custoUnitario*qtdN;

  // Verifica disponibilidade de cada ingrediente no estoque
  const checagem=ings.map(i=>{ const item=i.estoque_id?(estoque||[]).find(e=>e.id===i.estoque_id):null;
    const necessario=Number(i.quantidade||0)*qtdN;
    const disponivel=item?Number(item.qtd||0):null;
    const suficiente=item?disponivel>=necessario:true; // se não vinculado ao estoque, não valida
    return{...i,item,necessario,disponivel,suficiente}; });
  const faltando=checagem.filter(c=>c.item&&!c.suficiente);

  const produzir=async()=>{ if(!fichaId){toast('Selecione a ficha técnica',true);return;}
    if(qtdN<=0){toast('Informe a quantidade produzida',true);return;}
    if(faltando.length>0&&!confirm('Estoque insuficiente para: '+faltando.map(f=>f.nome).join(', ')+'. Produzir mesmo assim?'))return;

    setLd(true);

    // 1. Baixa os ingredientes do estoque
    for(const c of checagem){ if(c.item){ const novaQtd=Number(c.item.qtd||0)-c.necessario;
        // Mantém qtd_embalagem e recalcula qtd_estoque proporcionalmente
        const emb=Number(c.item.qtd_embalagem||1);
        const novaQtdEstoque=emb>0?novaQtd/emb:0;
        await sb.from('estoque').update({qtd:novaQtd,qtd_estoque:novaQtdEstoque}).eq('id',c.item.id); } }

    // 2. Dá entrada no produto acabado (busca ou cria item "Produto Acabado" com nome da ficha)

function FinCategorias({uid,db,reload,setM}){ const{categorias_fin}=db;
  const COR={receita:'#16a34a',despesa:'#dc2626',ativo:'#2563eb',passivo:'#7c3aed'};
  const BG_HEADER={receita:'#dcfce7',despesa:'#fee2e2',ativo:'#dbeafe',passivo:'#ede9fe'};

  const editarCat=(c)=>setM({title:'Editar — '+c.nome,body:React.createElement(CatForm,{uid,grupo:c.grupo,tipo:c.tipo,inicial:c,reload,close:()=>setM(null)})});
  const novaCategoria=(tipo)=>setM({title:'Nova Conta',body:React.createElement(CatForm,{uid,grupo:'',tipo,reload,close:()=>setM(null)})});
  const excluirCat=async(id,nome)=>{ await sb.from('categorias_fin').delete().eq('id',id);
    toast('Excluída!',false,true);reload(); };

  // Merge PLANO_CONTAS + categorias_fin custom
  const customByParent={};
  (categorias_fin||[]).forEach(c=>{ const key=c.grupo||'4';
    if(!customByParent[key])customByParent[key]=[];
    customByParent[key].push(c); });

  const nivelStyle=[
    {fontSize:15,fontWeight:900,color:'#111',paddingLeft:0,paddingTop:10,paddingBottom:6,borderTop:'2px solid #111',marginTop:8}, {fontSize:13,fontWeight:700,color:'#444',paddingLeft:20,paddingTop:6,paddingBottom:4,borderTop:'1px solid #e5e5e5',marginTop:2}, {fontSize:12,fontWeight:400,color:'#555',paddingLeft:44,paddingTop:4,paddingBottom:4}, {fontSize:11,fontWeight:400,color:'#888',paddingLeft:68,paddingTop:3,paddingBottom:3}, ];

  // Build rows iteratively: keeps processing until all customs placed
  const rows=[];
  PLANO_CONTAS.forEach(item=>rows.push({...item,custom:false}));

  // Place customs in correct position — multiple passes to handle nested customs
  const pendentes=[...(categorias_fin||[])];
  let maxPasses=10;
  while(pendentes.length&&maxPasses-->0){
    const antes=pendentes.length;
    for(let pi=pendentes.length-1;pi>=0;pi--){
      const c=pendentes[pi];
      const grupo=c.grupo||'';
      // Find parent row by matching cod+nome or just nome
      const parentIdx=rows.findLastIndex(r=>
        (r.cod?r.cod+' '+r.nome:r.nome)===grupo||r.nome===grupo
      );
      if(parentIdx===-1)continue; // parent not placed yet
      const parentItem=rows[parentIdx];
      const parentNivel=parentItem.nivel;
      // Find insert position: after all existing children of this parent
      let insertAt=parentIdx+1;
      while(insertAt<rows.length&&rows[insertAt].nivel>parentNivel)insertAt++;
      // Count siblings at same level under same parent for auto-code
      const siblings=rows.slice(parentIdx+1,insertAt).filter(r=>r.nivel===parentNivel+1);
      const nextNum=siblings.length+1;
      const autoCode=parentItem.cod?(parentItem.cod+'.'+nextNum):String(nextNum);
      rows.splice(insertAt,0,{cod:autoCode,nome:c.nome,tipo:c.tipo||parentItem.tipo,nivel:parentNivel+1,custom:true,id:c.id,grupo:c.grupo,catObj:c});
      pendentes.splice(pi,1);
    }
    if(pendentes.length===antes)break; // no progress, avoid infinite loop
  }
  // Anything still pending has no valid parent — show at bottom
  pendentes.forEach(c=>rows.push({cod:'',nome:c.nome,tipo:c.tipo||'despesa',nivel:2,custom:true,id:c.id,grupo:c.grupo,catObj:c}));

  const[dragId,setDragId]=React.useState(null);
  const[reordenados,setReordenados]=React.useState(null); // null = use rows default
  const rowsOrdenados=reordenados||rows;

  const moveRow=(fromIdx,toIdx)=>{
    if(fromIdx===toIdx)return;
    setReordenados(p=>{
      const base=[...(p||rows)];
      const[m]=base.splice(fromIdx,1);
      base.splice(toIdx,0,m);
      // Recalculate codes and styles based on new positions
      return recalcCodes(base);
    });
  };

  const recalcCodes=(arr)=>{
    // For each item, find its parent (nearest preceding item with nivel = item.nivel - 1)
    const result=arr.map((item,i)=>({...item}));
    result.forEach((item,i)=>{
      if(!item.custom)return; // keep standard codes
      // Find nearest parent (item before with nivel = this.nivel - 1)
      let parent=null;
      for(let j=i-1;j>=0;j--){ if(result[j].nivel===item.nivel-1){parent=result[j];break;} }
      if(!parent)return;
      // Count siblings before this item with same parent
      const siblings=result.slice(0,i).filter(r=>r.nivel===item.nivel&&result.slice(0,i).some((x,xi)=>xi<i&&result[xi].nivel===item.nivel-1&&result[xi].cod===parent.cod));
      // Count all items (std+custom) with this parent and same level before this one
      let sibCount=0;
      for(let j=0;j<i;j++){ if(result[j].nivel===item.nivel){ let par=null; for(let k=j-1;k>=0;k--){if(result[k].nivel===item.nivel-1){par=result[k];break;}} if(par&&par.cod===parent.cod)sibCount++; } }
      item.cod=parent.cod+'.'+(sibCount+1);
      item.nivel=parent.nivel+1;
      // Inherit tipo from parent
      item.tipo=parent.tipo||item.tipo;
    });
    return result;
  };

  const salvarReordenamento=async()=>{
    if(!reordenados)return;
    // Save updated grupos for custom items
    const updates=reordenados.filter(r=>r.custom);
    for(const item of updates){
      const parent=reordenados.slice(0,reordenados.indexOf(item)).reverse().find(r=>r.nivel===item.nivel-1);
      if(parent){
        await sb.from('categorias_fin').update({grupo:parent.cod?parent.cod+' '+parent.nome:parent.nome}).eq('id',item.id);
      }
    }
    toast('Ordem salva!',false,true);
    reload();
    setReordenados(null);
  };

  return React.createElement(PW,{title:'Plano de Contas',sub:'Arraste para reordenar • Clique duplo para editar personalizadas', actions:[
      React.createElement('button',{key:'r',style:{background:'#dc2626',color:'#fff',padding:'8px 16px',borderRadius:9,fontSize:13,fontWeight:600,border:'none',cursor:'pointer'},onClick:()=>novaCategoria('despesa')},'+ Despesa'), React.createElement('button',{key:'re',style:{background:'#16a34a',color:'#fff',padding:'8px 16px',borderRadius:9,fontSize:13,fontWeight:600,border:'none',cursor:'pointer',marginLeft:8},onClick:()=>novaCategoria('receita')},'+ Receita'), reordenados&&React.createElement('button',{key:'sv',style:{background:'#2563eb',color:'#fff',padding:'8px 16px',borderRadius:9,fontSize:13,fontWeight:600,border:'none',cursor:'pointer',marginLeft:8},onClick:salvarReordenamento},'💾 Salvar ordem'), ]}, React.createElement('div',{style:{background:'#fff',borderRadius:14,padding:'8px 16px 16px',boxShadow:'0 1px 8px rgba(0,0,0,0.07)'}}, rowsOrdenados.map((item,i)=>{ const cor=COR[item.tipo]||'#555';
        const indent=item.nivel*20;
        const isTop=item.nivel===0;
        const isSub=item.nivel===1;
        const fontSize=isTop?15:isSub?13:12;
        const fontWeight=isTop?800:isSub?700:400;
        const color=isTop?'#111':isSub?'#333':item.custom?cor:'#666';
        return React.createElement('div',{key:item.custom?item.id:item.cod||i,
          draggable:true,
          onDragStart:e=>{setDragId(i);e.dataTransfer.effectAllowed='move';},
          onDragOver:e=>e.preventDefault(),
          onDrop:e=>{e.preventDefault();if(dragId!==null&&dragId!==i)moveRow(dragId,i);setDragId(null);},
          onDragEnd:()=>setDragId(null),
          onDoubleClick:item.custom?()=>editarCat(item.catObj):undefined,
          style:{display:'flex',alignItems:'center',gap:8, paddingLeft:8+indent,paddingRight:12, paddingTop:isTop?10:isSub?6:4, paddingBottom:isTop?10:isSub?6:4, borderTop:isTop?'2px solid #e5e5e5':isSub?'1px solid #f0f0f0':'none', marginTop:isTop?8:0, opacity:dragId===item.id?0.4:1, cursor:item.custom?'grab':'default', fontFamily:'inherit'}},
          React.createElement('span',{style:{color:'#ccc',fontSize:13,userSelect:'none',marginRight:4,cursor:'grab'}},'⠿'),
          React.createElement('span',{style:{fontSize,fontWeight,color,minWidth:isTop?20:isSub?36:52,flexShrink:0}}, item.cod||(item.custom?'':'')),
          React.createElement('span',{style:{fontSize,fontWeight,color,flex:1}}, item.nome),
          React.createElement('div',{style:{display:'flex',gap:4,alignItems:'center'},onClick:e=>e.stopPropagation()}, item.custom&&React.createElement('button',{ onClick:()=>setM({title:'Editar — '+item.nome,body:React.createElement(CatForm,{uid,grupo:item.catObj.grupo,tipo:item.catObj.tipo,inicial:item.catObj,isEdit:true,reload,close:()=>setM(null)})}), style:{fontSize:11,color:'#555',background:'#f5f5f5',border:'none',borderRadius:4,padding:'2px 8px',cursor:'pointer'}},'✏'), React.createElement('button',{ onClick:()=>setM({title:'+ Subcategoria em '+(item.cod||item.nome),body:React.createElement(CatForm,{uid,grupo:(item.cod?item.cod+' ':'')+item.nome,tipo:item.tipo,fixGrupo:true,reload,close:()=>setM(null)})}), style:{fontSize:11,color:'#16a34a',background:'#f0fdf4',border:'none',borderRadius:4,padding:'2px 8px',cursor:'pointer',fontWeight:700}},'+'), React.createElement('button',{ onClick:e=>{e.stopPropagation();if(item.custom)excluirCat(item.id,item.nome);else toast('Contas padrão não podem ser excluídas',true);}, style:{fontSize:10,color:'#dc2626',background:'#fee2e2',border:'none',borderRadius:4,padding:'2px 7px',cursor:'pointer'}},'×')
          )
        ); })
    )
  );
}

function FinCentros({uid,db,reload,setM}){ const{centros_custo,lancamentos}=db;

  const novo=()=>setM({title:'Novo Centro de Custo',body:React.createElement(CentroForm,{uid,reload,close:()=>setM(null)})});
  const excluir=async(id,nome)=>{ if(!confirm('Excluir "'+nome+'"?'))return;
    await sb.from('centros_custo').delete().eq('id',id);
    toast('Excluído!',false,true);reload(); };

  // gastos por centro (periodo atual)
  const mes=TODAY().slice(0,7);
  const gastosPorCentro={};
  (lancamentos||[]).filter(l=>l.tipo==='despesa'&&l.data&&l.data.slice(0,7)===mes&&l.centro_custo).forEach(l=>{ const k=l.centro_custo;
    gastosPorCentro[k]=(gastosPorCentro[k]||0)+Number(l.valor); });

  const todosNomes=[...CENTROS_PADRAO.map(c=>c.nome),...(centros_custo||[]).map(c=>c.nome)];
  const totalMes=Object.values(gastosPorCentro).reduce((s,v)=>s+v,0);

  return React.createElement(PW,{title:'Centro de Custo',sub:'Classifique seus lançamentos por centro de custo', actions:[React.createElement('button',{key:'n',style:{background:'#dc2626',color:'#fff',padding:'8px 16px',borderRadius:9,fontSize:13,fontWeight:600,border:'none',cursor:'pointer'},onClick:novo},'+ Novo Centro')]}, // Cards dos centros
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(300px,1fr))',gap:14,marginBottom:20}}, // Padrões

  const cbCfgLS=(()=>{try{const r=localStorage.getItem('cb_'+contaId);return r?JSON.parse(r):null;}catch(e){return null;}})();
  const cbCfg=cbCfgDB||cbCfgLS;
  if(!cbCfg||!cbCfg.pct||!cbCfg.conta_id)return Promise.resolve(null);
  const cbVal=parseFloat((valor*cbCfg.pct/100).toFixed(2));
  if(cbVal<=0)return Promise.resolve(null);
  return sb.from('lancamentos').insert({ user_id:uid,tipo:'receita', descricao:'Cashback '+conta.nome+' ('+(cbCfg.pct)+'%)', valor:cbVal,data,venc:data,data_pag:data,pago:true, conta_id:cbCfg.conta_id, categoria:'3.1 Receita de Venda de Produtos', obs:'cashback_despesa' });

function Ativos({uid,db,reload,setM}){
  const ativos=db.ativos||[];
  const hoje=TODAY();
  const[mesDepr,setMesDepr]=React.useState(hoje.slice(0,7)); // YYYY-MM
  const[lancandoDepr,setLancandoDepr]=React.useState(false);

  const lancarDepreciacao=async()=>{
    setLancandoDepr(true);
    const [ano,mes]=mesDepr.split('-').map(Number);
    const ultimoDia=new Date(ano,mes,0).toLocaleDateString('sv-SE'); // last day of month
    const competencia=mesDepr;
    const obsDepr='depreciacao_mensal_'+mesDepr;

    // Check if already launched this month
    const{data:exist}=await sb.from('lancamentos').select('id').eq('user_id',uid).eq('obs',obsDepr).limit(1);
    if(exist&&exist.length>0){ toast('Depreciação de '+mesDepr+' já lançada! Exclua em Lançamentos para relançar.',true); setLancandoDepr(false); return; }

    // Generate one lançamento per ativo
    const rows=[];
    ativos.filter(a=>a.ativo).forEach(a=>{
      const ini=new Date(a.data_aquisicao+'T12:00:00');
      const fimVida=new Date(ini);fimVida.setFullYear(fimVida.getFullYear()+(parseInt(a.vida_util_anos)||10));
      const primeiroDia=mesDepr+'-01';
      if(a.data_aquisicao>ultimoDia)return; // not yet acquired
      if(fimVida.toLocaleDateString('sv-SE')<primeiroDia)return; // fully depreciated
      const mensal=((parseFloat(a.valor_aquisicao)||0)-(parseFloat(a.valor_residual)||0))/((parseInt(a.vida_util_anos)||10)*12);
      if(mensal<=0)return;
      rows.push({user_id:uid,tipo:'despesa',descricao:'Depreciação — '+a.nome,valor:parseFloat(mensal.toFixed(2)),
        categoria:'4.3.3.7 Depreciação',conta_id:null,forma_pag:null,

  // Dá baixa no estoque de Produto Acabado quando um pedido é entregue/finalizado.

    const sourceId=String(pedido.source_id||pedido.id||'');

    // Verifica se já foi processado (leitura rápida, não é a trava definitiva)
    const{data:jaProcessado,error:errCheck}=await sb.from('estoque_baixas').select('id').eq('user_id',user.id).eq('pedido_source_id',sourceId).maybeSingle();
    if(errCheck){toast('Erro estoque_baixas: '+errCheck.message,true);return;}

    // Pedido cancelado: se já tinha baixa registrada, devolve o estoque
    if(pedido.status==='canceled'){ if(!jaProcessado)return;
      const itens=(pedido.raw&&pedido.raw.items)||pedido.itens||[];
      const{data:fichas}=await sb.from('fichas_tecnicas').select('*').eq('user_id',user.id);
      const{data:estoqueAtual}=await sb.from('estoque').select('*').eq('user_id',user.id).eq('categoria','Cookie');
      const isIfood=pedido.canal==='ifood';

        if(!nomeItem)continue;
        const ficha=(fichas||[]).find(f=>{ const campo=isIfood?f.nome_ifood:f.nome_cw;
          return campo&&campo.toLowerCase()===nomeItem.toLowerCase(); })||(fichas||[]).find(f=>f.nome_cw&&f.nome_cw.toLowerCase()===nomeItem.toLowerCase())
          ||(fichas||[]).find(f=>f.nome_ifood&&f.nome_ifood.toLowerCase()===nomeItem.toLowerCase());
        if(!ficha)continue;
        const prod=(estoqueAtual||[]).find(e=>e.nome===ficha.nome);
        const qtdVendida=Number(it.quantity||it.qty||1);
        if(prod){ const novaQtd=Number(prod.qtd||0)+qtdVendida;
          await sb.from('estoque').update({qtd:novaQtd,qtd_estoque:novaQtd}).eq('id',prod.id);
          await sb.from('estoque_movimentos').insert({ user_id:user.id,estoque_id:prod.id,produto_nome:ficha.nome, tipo:'saida_cancelamento',quantidade:qtdVendida,saldo_apos:novaQtd, referencia:'#'+(pedido.pedido_id||sourceId), descricao:'Devolução — pedido #'+(pedido.pedido_id||sourceId)+' cancelado' }); } }
      await sb.from('estoque_baixas').delete().eq('user_id',user.id).eq('pedido_source_id',sourceId);
      toast('↩ Pedido #'+(pedido.pedido_id||'')+' cancelado — estoque devolvido',false,true);
      const{data:novoEstoque}=await sb.from('estoque').select('*').eq('user_id',user.id).order('nome');
      if(novoEstoque)setDb(p=>({...p,estoque:novoEstoque}));
      return; }

    // Baixa a partir do momento que o pedido é aceito (confirmed) até finalizado
    if(!['confirmed','ready','released','waiting_to_catch','delivered','closed'].includes(pedido.status))return;
    if(jaProcessado)return;

    // TRAVA ATÔMICA: tenta inserir o registro de baixa ANTES de processar.
    // Se outra chamada concorrente já inseriu (constraint UNIQUE violada), aborta aqui
    // — isso evita descontar o mesmo pedido 2x quando Realtime e polling disparam quase juntos.
    const{error:errLock}=await sb.from('estoque_baixas').insert({user_id:user.id,pedido_source_id:sourceId});
    if(errLock){ // 23505 = unique_violation no Postgres: outra chamada já processou este pedido, ignora
      if(errLock.code!=='23505')toast('Erro ao travar baixa: '+errLock.message,true);
      return; }

    const itens=(pedido.raw&&pedido.raw.items)||pedido.itens||[];
    if(!itens.length)return;

    const{data:fichas,error:errFichas}=await sb.from('fichas_tecnicas').select('*').eq('user_id',user.id);
    if(errFichas){toast('Erro fichas: '+errFichas.message,true);return;}
    const{data:estoqueAtual,error:errEst}=await sb.from('estoque').select('*').eq('user_id',user.id).eq('categoria','Cookie');
    if(errEst){toast('Erro estoque: '+errEst.message,true);return;}

    const semVinculo=[];
    const isIfood=pedido.canal==='ifood';
    for(const it of itens){ const nomeItem=(it.name||it.nome||'').trim();
      if(!nomeItem)continue;
      const ficha=(fichas||[]).find(f=>{ const campo=isIfood?f.nome_ifood:f.nome_cw;
        return campo&&campo.toLowerCase()===nomeItem.toLowerCase(); })||(fichas||[]).find(f=>f.nome_cw&&f.nome_cw.toLowerCase()===nomeItem.toLowerCase())
        ||(fichas||[]).find(f=>f.nome_ifood&&f.nome_ifood.toLowerCase()===nomeItem.toLowerCase());
      if(!ficha){semVinculo.push(nomeItem);continue;}
      const prod=(estoqueAtual||[]).find(e=>e.nome===ficha.nome);
      const qtdVendida=Number(it.quantity||it.qty||1);
      if(prod){ const novaQtd=Number(prod.qtd||0)-qtdVendida;
        const{error:errUpd}=await sb.from('estoque').update({qtd:novaQtd,qtd_estoque:novaQtd}).eq('id',prod.id);
        if(errUpd){toast('Erro ao baixar '+ficha.nome+': '+errUpd.message,true);}
        else{ await sb.from('estoque_movimentos').insert({ user_id:user.id,estoque_id:prod.id,produto_nome:ficha.nome, tipo:'saida_venda',quantidade:qtdVendida,saldo_apos:novaQtd, referencia:'#'+(pedido.pedido_id||sourceId), descricao:'Venda — pedido #'+(pedido.pedido_id||sourceId)+(pedido.cliente?' · '+pedido.cliente:'') }); } }
      // Se não existe produto acabado cadastrado ainda, não cria — só alerta quando vender sem produção prévia
}

    if(semVinculo.length>0){ toast('⚠ Pedido #'+(pedido.pedido_id||'')+': sem vínculo de estoque para '+semVinculo.join(', '),true); }

    // Atualiza estoque na tela
    const{data:novoEstoque}=await sb.from('estoque').select('*').eq('user_id',user.id).order('nome');
    if(novoEstoque)setDb(p=>({...p,estoque:novoEstoque})); };

  React.useEffect(()=>{ window._processarBaixaEstoque=processarBaixaEstoque;

          // Auto-abertura do caixa no primeiro pedido do dia
          try{ const{data:cxExiste}=await sb.from('caixas').select('id').eq('user_id',user.id).eq('status','aberto').maybeSingle();
            if(!cxExiste){ const{data:cxHoje}=await sb.from('caixas').select('id').eq('user_id',user.id).eq('data',hoje).maybeSingle();
              if(!cxHoje){ await sb.from('caixas').insert({user_id:user.id,data:hoje,status:'aberto',saldo_abertura:0,suprimentos:0,sangrias:0});
                const{data:cxs}=await sb.from('caixas').select('*').eq('user_id',user.id).order('criado_em',{ascending:false}).limit(30);
                if(cxs)setDb(prev=>({...prev,caixas:cxs}));
                toast('🔓 Caixa aberto automaticamente!',false,true); } } }catch(e){} },800); })
      .on('postgres_changes',{event:'UPDATE',schema:'public',table:'pedidos_cw'},async(payload)=>{ if(payload.new&&payload.new.user_id!==user.id)return;
        if(payload.new){setDb(prev=>({...prev,pedidos_cw:(prev.pedidos_cw||[]).map(p=>p.id===payload.new.id?{...p,...payload.new}:p)}));}
        if(payload.new&&['confirmed','ready','released','waiting_to_catch','delivered','closed','canceled'].includes(payload.new.status)){ processarBaixaEstoque(payload.new); }
        clearTimeout(debounce);
        debounce=setTimeout(async()=>{ const hoje=new Date().toLocaleDateString('sv-SE',{timeZone:'America/Sao_Paulo'});
          const{data}=await sb.from('pedidos_cw').select('*').eq('user_id',user.id).gte('data_pedido',hoje).order('data_pedido',{ascending:false});
          if(data)setDb(prev=>({...prev,pedidos_cw:[...data,...(prev.pedidos_cw||[]).filter(p=>p.data_pedido<hoje)]})); },800); })
      .subscribe();
    return()=>{clearTimeout(debounce);sb.removeChannel(channel);}; },[user]);
