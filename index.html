// ── CAIXA ──
function PedCaixa({uid,db,reload,setM}){
  const{pedidos_cw,lancamentos,contas}=db;
  const hoje=TODAY();

  const pedidosHoje=(pedidos_cw||[]).filter(p=>p.data_pedido===hoje);
  const entregues=pedidosHoje.filter(p=>p.status==='delivered'||p.status==='closed');
  const pendentes=pedidosHoje.filter(p=>!['delivered','closed','canceled'].includes(p.status));

  // Agrupa por forma de pagamento
  const porForma={};
  entregues.forEach(p=>{
    const pags=p.pagamentos||[];
    pags.forEach((pg)=>{
      const pmKey=(pg.payment_method||'').toLowerCase();
      if(pmKey==='ifood'||pmKey==='online_credit_card')return;
      const nm=PM_MAP_CW[pmKey]||pmKey;
      porForma[nm]=(porForma[nm]||0)+Number(pg.value||pg.total||0);
    });
  });

  const totalBruto=Object.values(porForma).reduce((s,v)=>s+v,0);
  const lancHoje=(lancamentos||[]).filter(l=>l.data===hoje&&l.obs==='consolidado_cw'&&l.tipo==='receita');
  const totalLiquido=lancHoje.reduce((s,l)=>s+Number(l.valor||0),0);
  const totalTaxa=totalBruto-totalLiquido;

  return React.createElement(PW,{title:'Caixa',sub:'Resumo financeiro do dia'},
    // Cards topo
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12,marginBottom:20}},
      React.createElement(SC,{label:'Total Bruto',val:F(totalBruto),color:'#111'}),
      React.createElement(SC,{label:'Taxas',val:F(totalTaxa),color:'#dc2626'}),
      React.createElement(SC,{label:'Total Líquido',val:F(totalLiquido),color:'#16a34a'}),
      React.createElement(SC,{label:'Pendentes',val:pendentes.length,color:'#f59e0b'})
    ),

    // Por forma de pagamento
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14,marginBottom:20}},
      React.createElement('div',{style:{background:'#fff',borderRadius:14,padding:'18px',boxShadow:'0 1px 8px rgba(0,0,0,0.07)'}},
        React.createElement('div',{style:{fontWeight:700,fontSize:14,marginBottom:14,color:'#111'}},'Recebimentos por Forma'),
        Object.keys(porForma).length===0
          ? React.createElement('div',{style:{color:'#ccc',fontSize:13}},'Nenhum recebimento hoje')
          : Object.entries(porForma).map(([forma,val])=>
              React.createElement('div',{key:forma,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid #f5f5f5'}},
                React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8}},
                  React.createElement('div',{style:{width:8,height:8,borderRadius:'50%',background:forma==='PIX'?'#16a34a':forma.includes('Crédito')?'#f59e0b':forma.includes('Débito')?'#3b82f6':'#6b7280'}}),
                  React.createElement('span',{style:{fontSize:13,color:'#555'}},forma)
                ),
                React.createElement('span',{style:{fontWeight:700,fontSize:14}},F(val))
              )
            )
      ),

      // Contas
      React.createElement('div',{style:{background:'#fff',borderRadius:14,padding:'18px',boxShadow:'0 1px 8px rgba(0,0,0,0.07)'}},
        React.createElement('div',{style:{fontWeight:700,fontSize:14,marginBottom:14,color:'#111'}},'Saldo das Contas'),
        (contas||[]).map((c)=>
          React.createElement('div',{key:c.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 0',borderBottom:'1px solid #f5f5f5'}},
            React.createElement('span',{style:{fontSize:13,color:'#555'}},c.nome),
            React.createElement('span',{style:{fontWeight:700,fontSize:14,color:Number(c.saldo)>=0?'#16a34a':'#dc2626'}},F(c.saldo))
          )
        )
      )

    // Pedidos pendentes
    pendentes.length>0&&React.createElement('div',{style:{background:'#fffbeb',borderRadius:14,padding:'18px',boxShadow:'0 1px 8px rgba(0,0,0,0.07)',border:'1px solid #fef3c7'}},
      React.createElement('div',{style:{fontWeight:700,fontSize:14,marginBottom:12,color:'#92400e'}},pendentes.length+' pedidos pendentes'),
      pendentes.map(p=>React.createElement('div',{key:p.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:'1px solid #fef3c7'}},
        React.createElement('div',null,

          React.createElement('span',{style:{fontSize:12,color:'#555'}},p.cliente||'—')

function PedidosCW({uid,db,setDb,reload,setM,cfg,setCfg}){
  const{pedidos_cw,contas,formas_pag}=db;
  const[fil,setFil]=React.useState('');
  const[busca,setBusca]=React.useState('');
  const hoje=TODAY();

  const list=React.useMemo(()=>{
    let r=(pedidos_cw||[]).filter(p=>{
      if(p.data_pedido===hoje)return true;
      const raw=p.raw||{};
      if(raw.created_at){
        const dtBRT=new Date(raw.created_at).toLocaleDateString('sv-SE',{timeZone:'America/Sao_Paulo'});
        return dtBRT===hoje;
      }
      return false;
    });
    if(fil)r=r.filter(p=>p.status===fil);
    if(busca){const b=busca.toLowerCase();r=r.filter(p=>(p.cliente||'').toLowerCase().includes(b)||(p.pedido_id||'').includes(b));}
    r.sort((a,b)=>Number(b.pedido_id||0)-Number(a.pedido_id||0));
    return r;
  },[pedidos_cw,fil,busca,hoje]);

  const counts=React.useMemo(()=>{
    const c={total:0,confirmados:0,entregues:0,cancelados:0,faturamento:0};
    list.forEach(p=>{
      c.total++;
      if(['confirmed','released','ready','waiting_to_catch'].includes(p.status))c.confirmados++;
      if(p.status==='delivered'||p.status==='closed'){c.entregues++;c.faturamento+=Number(p.total||0);}
      if(p.status==='canceled')c.cancelados++;

    return c;

      React.createElement('span',null,'Configure seu token do Cardápio Web para receber pedidos em tempo real'),
      React.createElement('button',{style:{background:'#2563eb',color:'#fff',padding:'7px 14px',borderRadius:8,fontSize:12,fontWeight:600,border:'none',cursor:'pointer'},onClick:abrirConfig},'Configurar agora')
    ),

    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:13,marginBottom:20}},

function advanceDate(base,freq,i){
  const[yr0,mo0,dy0]=base.split('-').map(Number);
  let yr=yr0,mo=mo0-1,dy=dy0;
  if(freq==='semanal'){const t=new Date(yr,mo,dy+i*7);yr=t.getFullYear();mo=t.getMonth();dy=t.getDate();}
  else if(freq==='quinzenal'){const t=new Date(yr,mo,dy+i*15);yr=t.getFullYear();mo=t.getMonth();dy=t.getDate();}
  else if(freq==='mensal'){mo+=i;}
  else if(freq==='bimestral'){mo+=i*2;}
  else if(freq==='trimestral'){mo+=i*3;}
  else if(freq==='semestral'){mo+=i*6;}
  else if(freq==='anual'){yr+=i;}
  const n=new Date(yr,mo,dy);
  return n.getFullYear()+'-'+String(n.getMonth()+1).padStart(2,'0')+'-'+String(n.getDate()).padStart(2,'0');
}

async function importarLancamentos(uid, arquivo, contas, reload, onDone){
  const reader = new FileReader();
  reader.onload = async (e) => {
    try {
      const wb = XLSX.read(e.target.result, {type:'array'});
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, {defval:''});
      if(!rows.length){toast('Arquivo vazio',true);return;}

      const mapeiaData = (v) => {
        if(!v)return null;
        const s = String(v).trim();
        // formato YYYY-MM-DD
        if(/^\d{4}-\d{2}-\d{2}$/.test(s))return s;
        // formato DD/MM/YYYY
        if(/^\d{2}\/\d{2}\/\d{4}$/.test(s)){const[d,m,y]=s.split('/');return y+'-'+m+'-'+d;}
        // numero serial do excel
        if(!isNaN(s)){const d=new Date((+s-25569)*86400000);return d.toISOString().split('T')[0];}
        return null;
      };

      const lancToInsert = rows.map(r => ({
        user_id: uid,
        tipo:     (String(r['Tipo']||'despesa')).toLowerCase().includes('rec')?'receita':'despesa',
        descricao:String(r['Descricao']||r['Descrição']||r['descricao']||'Sem descricao'),
        valor:    parseFloat(String(r['Valor']||0).replace(',','.'))||0,
        categoria:String(r['Categoria']||r['categoria']||''),
        forma_pag:String(r['Forma Pagto']||r['Forma de Pagamento']||''),
        data:     mapeiaData(r['Data']||r['data'])||TODAY(),
        venc:     mapeiaData(r['Vencimento']||r['vencimento'])||mapeiaData(r['Data']||r['data'])||TODAY(),
        data_pag: mapeiaData(r['Data Pagto']||r['Data Pagamento'])||null,
        pago:     String(r['Pago']||'').toLowerCase()==='sim'||String(r['Pago']||'')==='true',
        obs:      String(r['Obs']||r['Observacao']||r['Observação']||''),
        conta_id: null, // conta por nome abaixo
      })).filter(l=>l.descricao&&l.descricao.length>0&&l.valor>0);

      // Tentar mapear conta por nome
      lancToInsert.forEach((l,i) => {
        const nomeConta = String(rows[i]['Conta']||'').toLowerCase();
        if(nomeConta){
          const c = (contas||[]).find(c=>(c.nome||'').toLowerCase().includes(nomeConta)||nomeConta.includes((c.nome||'').toLowerCase()));
          if(c)l.conta_id = c.id;
        }
      });

      if(!lancToInsert.length){toast('Nenhum lancamento valido encontrado',true);return;}
      const {error} = await sb.from('lancamentos').insert(lancToInsert);
      if(error){toast('Erro: '+error.message,true);return;}
      toast(lancToInsert.length+' lancamentos importados!',false,true);
      reload();
      onDone();
    } catch(err){
      toast('Erro ao processar arquivo: '+err.message,true);
    }
  };
  reader.readAsArrayBuffer(arquivo);
}

function DateRangePicker({dtIni,dtFim,onChange,onClose}){
  const hoje=TODAY();
  const parse=(s)=>{const p=s.split('-');return{y:+p[0],m:+p[1]-1,d:+p[2]};};
  const fmt=(y,m,d)=>y+'-'+String(m+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');

  const[lm,setLm]=React.useState(()=>{const p=parse(dtIni);return{y:p.y,m:p.m};});
  const rm={y:lm.m===11?lm.y+1:lm.y,m:lm.m===11?0:lm.m+1};
  const[sel,setSel]=React.useState({ini:dtIni,fim:dtFim,hover:null});
  const[confirmed,setConfirmed]=React.useState(false);

  const navL=(d)=>setLm(p=>{let m=p.m+d,y=p.y;if(m<0){m=11;y--;}else if(m>11){m=0;y++;}return{y,m};});

  const ATALHOS=[
    ['hoje','Hoje',()=>{const t=hoje;return{ini:t,fim:t};}],
    ['ontem','Ontem',()=>{const d=new Date(hoje);d.setDate(d.getDate()-1);const t=d.toISOString().split('T')[0];return{ini:t,fim:t};}],
    ['amanha','Amanha',()=>{const d=new Date(hoje);d.setDate(d.getDate()+1);const t=d.toISOString().split('T')[0];return{ini:t,fim:t};}],
    ['sem','Esta semana',()=>{const d=new Date(hoje);const dow=d.getDay();const ini=new Date(d);ini.setDate(d.getDate()-dow);const fim=new Date(ini);fim.setDate(ini.getDate()+6);return{ini:ini.toISOString().split('T')[0],fim:fim.toISOString().split('T')[0]};}],
    ['semp','Semana passada',()=>{const d=new Date(hoje);const dow=d.getDay();const ini=new Date(d);ini.setDate(d.getDate()-dow-7);const fim=new Date(ini);fim.setDate(ini.getDate()+6);return{ini:ini.toISOString().split('T')[0],fim:fim.toISOString().split('T')[0]};}],
    ['semn','Proxima semana',()=>{const d=new Date(hoje);const dow=d.getDay();const ini=new Date(d);ini.setDate(d.getDate()+(7-dow));const fim=new Date(ini);fim.setDate(ini.getDate()+6);return{ini:ini.toISOString().split('T')[0],fim:fim.toISOString().split('T')[0]};}],
    ['mes','Este mes',()=>{const d=new Date();const ini=new Date(d.getFullYear(),d.getMonth(),1);const fim=new Date(d.getFullYear(),d.getMonth()+1,0);return{ini:ini.toISOString().split('T')[0],fim:fim.toISOString().split('T')[0]};}],
    ['mesp','Mes passado',()=>{const d=new Date();const ini=new Date(d.getFullYear(),d.getMonth()-1,1);const fim=new Date(d.getFullYear(),d.getMonth(),0);return{ini:ini.toISOString().split('T')[0],fim:fim.toISOString().split('T')[0]};}],
    ['mesn','Proximo mes',()=>{const d=new Date();const ini=new Date(d.getFullYear(),d.getMonth()+1,1);const fim=new Date(d.getFullYear(),d.getMonth()+2,0);return{ini:ini.toISOString().split('T')[0],fim:fim.toISOString().split('T')[0]};}],
  ];

  // last 3 months as shortcuts
  const mesesAnts=Array.from({length:4},(_,i)=>{
    const d=new Date();d.setMonth(d.getMonth()-(i+1));
    const y=d.getFullYear(),m=d.getMonth();
    const ini=new Date(y,m,1).toISOString().split('T')[0];
    const fim=new Date(y,m+1,0).toISOString().split('T')[0];
    const label=new Date(y,m,1).toLocaleDateString('pt-BR',{month:'long',year:'numeric'});
    return[label,()=>({ini,fim})];
  });

  const applyAtalho=(fn)=>{const r=fn();setSel({ini:r.ini,fim:r.fim,hover:null});};
  const isActive=(fn)=>{const r=fn();return sel.ini===r.ini&&sel.fim===r.fim;};

  const renderMonth=(my)=>{
    const{y,m}=my;
    const DIAS_SEMANA=['Do','Se','Te','Qu','Qu','Se','Sa'];
    const primeiro=new Date(y,m,1).getDay();
    const total=new Date(y,m+1,0).getDate();
    const cells=[];
    for(let i=0;i<primeiro;i++)cells.push(null);
    for(let d=1;d<=total;d++)cells.push(d);
    while(cells.length%7!==0)cells.push(null);

    const label=new Date(y,m,1).toLocaleDateString('pt-BR',{month:'short',year:'numeric'});
    const isL=my===lm;

    return React.createElement('div',{style:{flex:1,minWidth:200}},
      // Header do mes
      React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}},
        isL?React.createElement('button',{onClick:()=>navL(-1),style:{background:'none',border:'none',color:'#aaa',cursor:'pointer',fontSize:16,padding:'0 6px'}},'<'):React.createElement('span',{style:{width:24}}),
        React.createElement('span',{style:{fontSize:13,fontWeight:700,color:'#111'}},label),
        !isL?React.createElement('button',{onClick:()=>navL(1),style:{background:'none',border:'none',color:'#aaa',cursor:'pointer',fontSize:16,padding:'0 6px'}},'>'):React.createElement('span',{style:{width:24}})
      ),
      // Cabecalho semana
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',marginBottom:4}},
        DIAS_SEMANA.map((d,i)=>React.createElement('div',{key:i,style:{textAlign:'center',fontSize:11,color:'#aaa',fontWeight:600,padding:'4px 0'}},d))
      ),
      // Dias
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(7,1fr)',gap:1}},
        cells.map((d,i)=>{
          if(!d)return React.createElement('div',{key:i});
          const ds=fmt(y,m,d);
          const isIni=ds===sel.ini,isFim=ds===sel.fim;
          const inRange=(sel.ini&&sel.fim&&ds>sel.ini&&ds<sel.fim)||(sel.ini&&!sel.fim&&sel.hover&&ds>sel.ini&&ds<sel.hover);
          const isToday=ds===hoje;
          return React.createElement('button',{
            key:i,
            onClick:()=>{
              if(!sel.ini||sel.fim){setSel({ini:ds,fim:null,hover:null});}
              else{if(ds<sel.ini)setSel({ini:ds,fim:sel.ini,hover:null});else setSel({ini:sel.ini,fim:ds,hover:null});}
            },
            onMouseEnter:()=>{if(sel.ini&&!sel.fim)setSel(p=>({...p,hover:ds}));},
            style:{
              textAlign:'center',fontSize:12,padding:'5px 0',borderRadius:6,border:'none',cursor:'pointer',
              background:isIni||isFim?'#dc2626':inRange?'#fee2e2':'transparent',
              color:isIni||isFim?'#fff':isToday?'#dc2626':'#333',
              fontWeight:isIni||isFim||isToday?700:400,
              outline:isToday&&!isIni&&!isFim?'2px solid #dc2626':'none',
            }
          },String(d));}
        )
      )
    );
  };

  return React.createElement('div',{style:{display:'flex',background:'#fff',borderRadius:16,boxShadow:'0 8px 40px rgba(0,0,0,0.16)',overflow:'hidden',minWidth:700}},
    // Atalhos
    React.createElement('div',{style:{width:160,borderRight:'1px solid #f0f0f0',padding:'12px 0',background:'#fafafa'}},
      ATALHOS.map(([k,l,fn])=>React.createElement('button',{key:k,onClick:()=>applyAtalho(fn),style:{display:'block',width:'100%',textAlign:'left',padding:'8px 18px',fontSize:13,color:isActive(fn)?'#dc2626':'#444',fontWeight:isActive(fn)?700:400,background:'none',border:'none',cursor:'pointer'}},l)),
      React.createElement('div',{style:{height:1,background:'#f0f0f0',margin:'8px 0'}}),
      mesesAnts.map(([l,fn],i)=>React.createElement('button',{key:i,onClick:()=>applyAtalho(fn),style:{display:'block',width:'100%',textAlign:'left',padding:'8px 18px',fontSize:12,color:isActive(fn)?'#dc2626':'#666',fontWeight:isActive(fn)?700:400,background:'none',border:'none',cursor:'pointer'}},l))
    ),
    // Calendarios + footer
    React.createElement('div',{style:{flex:1,padding:'16px 20px',display:'flex',flexDirection:'column'}},
      // Titulo range
      React.createElement('div',{style:{fontSize:13,fontWeight:600,color:'#555',marginBottom:14}},
        sel.ini&&sel.fim?new Date(sel.ini+'T12:00:00').toLocaleDateString('pt-BR',{month:'long',year:'numeric'}):
        sel.ini?'Selecione a data final':'Selecione um periodo'
      ),
      // Dois meses
      React.createElement('div',{style:{display:'flex',gap:24,flex:1}},
        renderMonth(lm),
        renderMonth(rm)
      ),
      // Footer
      React.createElement('div',{style:{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:16,paddingTop:12,borderTop:'1px solid #f0f0f0'}},
        React.createElement('div',{style:{display:'flex',gap:8}},
          // Atalhos trimestre
          [['2024','2024',()=>{const y=2024;return{ini:y+'-01-01',fim:y+'-12-31'};}],
           ['2025','2025',()=>{const y=2025;return{ini:y+'-01-01',fim:y+'-12-31'};}],
           ['2026','2026',()=>{const y=2026;return{ini:y+'-01-01',fim:y+'-12-31'};}],
           ['tri','Este trimestre',()=>{const d=new Date();const q=Math.floor(d.getMonth()/3);const ini=new Date(d.getFullYear(),q*3,1);const fim=new Date(d.getFullYear(),q*3+3,0);return{ini:ini.toISOString().split('T')[0],fim:fim.toISOString().split('T')[0]};}],
           ['trip','Trimestre passado',()=>{const d=new Date();const q=Math.floor(d.getMonth()/3)-1;const qr=q<0?3:q,yr=q<0?d.getFullYear()-1:d.getFullYear();const ini=new Date(yr,qr*3,1);const fim=new Date(yr,qr*3+3,0);return{ini:ini.toISOString().split('T')[0],fim:fim.toISOString().split('T')[0]};}],
          ].map(([k,l,fn])=>React.createElement('button',{key:k,onClick:()=>applyAtalho(fn),style:{padding:'5px 12px',borderRadius:8,fontSize:12,background:isActive(fn)?'#fee2e2':'#f5f5f5',color:isActive(fn)?'#dc2626':'#666',border:'none',cursor:'pointer',fontWeight:isActive(fn)?700:400}},l))
        ),
        React.createElement('button',{
          onClick:()=>{if(sel.ini&&sel.fim){onChange(sel.ini,sel.fim);onClose();}},
          style:{padding:'8px 22px',borderRadius:9,background:sel.ini&&sel.fim?'#dc2626':'#ccc',color:'#fff',border:'none',cursor:'pointer',fontWeight:700,fontSize:13}
        },'OK')
      )
    )
  );
}

function LancDetalhe({l,conta,uid,contas,db,reload,close}){
  const acent=l.tipo==='receita'?'#16a34a':'#dc2626';

  const confirmar=async()=>{
    const cid=l.conta_id||(contas[0]&&contas[0].id);
    await sb.from('lancamentos').update({pago:true,data_pag:TODAY()}).eq('id',l.id);
    if(cid){const c=contas.find(x=>x.id===cid);if(c)await sb.from('contas_bancarias').update({saldo:l.tipo==='receita'?Number(c.saldo)+Number(l.valor):Number(c.saldo)-Number(l.valor)}).eq('id',cid);}

      React.createElement('div',{style:{fontSize:11,color:acent,fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:6}},l.tipo==='receita'?'Receita':'Despesa'),
      React.createElement('div',{style:{fontSize:28,fontWeight:800,color:acent,letterSpacing:'-1px'}},(l.tipo==='receita'?'+':'-')+F(l.valor)),
      React.createElement('div',{style:{fontSize:12,color:'#aaa',marginTop:4}},l.descricao)
    ),
    // Detalhes
    React.createElement('div',{style:{background:'#fff',borderRadius:12,border:'1px solid #f0f0f0',padding:'4px 14px',marginBottom:14}},
      row('Categoria',l.categoria),
      row('Conta',conta&&conta.nome),
      row('Forma de Pagamento',l.forma_pag),
      row('Centro de Custo',l.centro_custo),
      row('Vencimento',FD(l.venc)),
      row('Competência',FD(l.competencia)),
      row('Data Pagamento',FD(l.data_pag)),
      row('Fornecedor',l.fornecedor),
      l.juros>0&&row('Juros',F(l.juros)),
      l.multa>0&&row('Multa',F(l.multa)),
      l.desconto>0&&row('Desconto','-'+F(l.desconto)),
      row('Parcela',l.parcela),
      row('Obs.',l.obs),
      row('Status',l.pago?'Pago':isV?'Vencido':'Pendente')
    ),
    React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'flex-end'}},
      !l.pago&&React.createElement('button',{style:{background:'#16a34a',color:'#fff',padding:'9px 18px',borderRadius:10,fontSize:13,fontWeight:600,border:'none',cursor:'pointer'},onClick:confirmar},'✓ Confirmar Pagamento'),
      React.createElement('button',{style:{background:'#f5f5f5',color:'#555',padding:'9px 16px',borderRadius:10,fontSize:13,border:'none',cursor:'pointer'},onClick:close},'Fechar')
    )
  );
}


function FinLancamentos({uid,db,reload,setM}){
  const{lancamentos,contas}=db;
  const hoje=TODAY();

  // periodo — default mes atual
  const[dtIni,setDtIni]=React.useState(()=>{const d=new Date();return new Date(d.getFullYear(),d.getMonth(),1).toISOString().split('T')[0];});
  const[dtFim,setDtFim]=React.useState(()=>new Date(new Date().getFullYear(),new Date().getMonth()+1,0).toISOString().split('T')[0]);
  const[showPicker,setShowPicker]=React.useState(false);
  const[filConta,setFilConta]=React.useState('');
  const[busca,setBusca]=React.useState('');
  const[showFiltro,setShowFiltro]=React.useState(false);
  const[filCat,setFilCat]=React.useState('');
  const[filStatus,setFilStatus]=React.useState('');
  const[filTipo,setFilTipo]=React.useState('');

  const periodoLabel=FD(dtIni)+' — '+FD(dtFim);

  const allPer=React.useMemo(()=>(lancamentos||[]).filter(l=>l.data&&l.data>=dtIni&&l.data<=dtFim),[lancamentos,dtIni,dtFim]);

  const list=React.useMemo(()=>{
    let r=allPer;
    if(filTipo)r=r.filter(l=>l.tipo===filTipo);
    if(filConta)r=r.filter(l=>l.conta_id===filConta);
    if(filCat)r=r.filter(l=>l.categoria===filCat);
    if(busca){const b=busca.toLowerCase();r=r.filter(l=>(l.descricao||'').toLowerCase().includes(b)||(l.categoria||'').toLowerCase().includes(b));}
    if(filStatus==='vencidos')r=r.filter(l=>!l.pago&&l.venc&&l.venc<hoje);
    else if(filStatus==='vence_hoje')r=r.filter(l=>!l.pago&&l.venc===hoje);
    else if(filStatus==='a_vencer')r=r.filter(l=>!l.pago&&l.venc&&l.venc>hoje);
    else if(filStatus==='pagos')r=r.filter(l=>!!l.pago);
    return r.sort((a,b)=>a.data>b.data?-1:1);
  },[allPer,filTipo,filConta,filCat,busca,filStatus,hoje]);

  const vencidos=allPer.filter(l=>!l.pago&&l.venc&&l.venc<hoje);
  const venceHoje=allPer.filter(l=>!l.pago&&l.venc===hoje);
  const aVencer=allPer.filter(l=>!l.pago&&l.venc&&l.venc>hoje);
  const pagos=allPer.filter(l=>!!l.pago);
  const totalPer=allPer.reduce((s,l)=>s+Number(l.valor),0);

  const novo=(tipo)=>{
    const titles={receita:'+ Nova Receita',despesa:'+ Nova Despesa',transferencia:'+ Transferência'};
    setM({wide:true,title:titles[tipo]||'+ Lançamento',body:React.createElement(LancForm,{uid,tipo,db,reload,close:()=>setM(null)})});
  };

  const confirmar=(l)=>setM({title:'Confirmar',body:
    React.createElement('div',null,
      React.createElement('div',{style:{background:'#f9f9fb',borderRadius:11,padding:'13px',marginBottom:14}},
        React.createElement('div',{style:{fontWeight:700,marginBottom:4}},l.descricao),
        React.createElement('div',{style:{fontSize:20,fontWeight:800,color:l.tipo==='receita'?'#16a34a':'#dc2626'}},F(l.valor))
      ),
      React.createElement(Sel,{label:'Conta',v:l.conta_id||(contas[0]&&contas[0].id)||'',set:()=>{},opts:contas.map(c=>({v:c.id,l:c.nome+' — '+F(c.saldo)}))}),
      React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',marginTop:8}},
        React.createElement('button',{style:{background:'#f5f5f5',color:'#555',padding:'9px 16px',borderRadius:10,fontSize:13,border:'none',cursor:'pointer'},onClick:()=>setM(null)},'Cancelar'),
        React.createElement('button',{style:{background:'#16a34a',color:'#fff',padding:'9px 18px',borderRadius:10,fontSize:13,fontWeight:600,border:'none',cursor:'pointer'},onClick:async()=>{
          const cid=l.conta_id||(contas[0]&&contas[0].id);
          await sb.from('lancamentos').update({pago:true,data_pag:TODAY()}).eq('id',l.id);
          if(cid){const c=contas.find(x=>x.id===cid);if(c)await sb.from('contas_bancarias').update({saldo:l.tipo==='receita'?Number(c.saldo)+Number(l.valor):Number(c.saldo)-Number(l.valor)}).eq('id',cid);}
          toast('Confirmado!',false,true);reload();setM(null);
        }},'Confirmar')
      )
    )
  });

  const excluir=async(l)=>{
    if(!confirm('Excluir "'+l.descricao+'"?'))return;
    if(l.grupo_id){const todos=confirm('Grupo encontrado.\nOK = todos  Cancelar = so este');if(todos)await sb.from('lancamentos').delete().eq('grupo_id',l.grupo_id).eq('user_id',uid);else await sb.from('lancamentos').delete().eq('id',l.id);}
    else await sb.from('lancamentos').delete().eq('id',l.id);
    toast('Excluido!',false,true);reload();
  };

  const abrirLanc=(l)=>{
    const titulo=l.tipo==='receita'?'Editar Receita':l.tipo==='despesa'?'Editar Despesa':'Editar Lançamento';
    setM({title:titulo,wide:true,body:React.createElement(LancForm,{uid,tipo:l.tipo,db,reload,inicial:l,close:()=>setM(null)})});
  };

  const badgeBtn=(id,label,itens,cor,bg)=>React.createElement('button',{
    onClick:()=>setFilStatus(filStatus===id?'':id),
    style:{display:'flex',alignItems:'center',gap:8,padding:'7px 14px',borderRadius:10,border:'none',cursor:'pointer',
      background:filStatus===id?bg:'#fff',boxShadow:'0 1px 4px rgba(0,0,0,0.07)',transition:'all 0.15s'}
  },
    React.createElement('span',{style:{fontSize:13,fontWeight:600,color:cor}},label),
    React.createElement('span',{style:{fontSize:13,fontWeight:800,color:cor}},F(itens.reduce((s,l)=>s+Number(l.valor),0)))
  );

  const cats=[...new Set(allPer.map(l=>l.categoria).filter(Boolean))].sort();
  const barSel={background:'transparent',border:'none',fontSize:13,color:'#555',cursor:'pointer',outline:'none'};
  const sep=React.createElement('div',{style:{width:1,height:28,background:'#f0f0f0',flexShrink:0}});

  return React.createElement(PW,{title:'Lancamentos',sub:periodoLabel,
    actions:[
      React.createElement('button',{key:'imp',style:{background:'#f5f5f5',color:'#555',padding:'8px 14px',borderRadius:9,fontSize:12,fontWeight:500,border:'none',cursor:'pointer'},onClick:()=>setM({title:'Importar Lancamentos (.xlsx)',wide:true,body:React.createElement(ImportModal,{uid,contas,reload,close:()=>setM(null)})})},'Importar'),
      React.createElement('button',{key:'exp',style:{background:'#f5f5f5',color:'#16a34a',padding:'8px 14px',borderRadius:9,fontSize:12,fontWeight:600,border:'none',cursor:'pointer'},onClick:()=>exportarLancamentos(list,contas,dtIni,dtFim)},'Exportar .xlsx'),
      React.createElement(AddDropdown,{key:'add',novo}),

function FinFormas({uid,db,reload,setM}){
  const{formas_pag,contas}=db;
  const[saving,setSaving]=React.useState({});

  // merge padrao + cadastradas
  const formasMap={};
  (formas_pag||[]).forEach(f=>formasMap[f.nome]=f);

  const todas=FORMAS_PADRAO_DEF.map(p=>({
    ...p,
    ...(formasMap[p.nome]||{}),
    id:formasMap[p.nome]&&formasMap[p.nome].id||null,
    conta_id:formasMap[p.nome]&&formasMap[p.nome].conta_id||'',
    taxa_pct:formasMap[p.nome]?formasMap[p.nome].taxa_pct:p.taxa_pct,
    dias:formasMap[p.nome]?formasMap[p.nome].dias:p.dias,
  }));

  const[local,setLocal]=React.useState(()=>Object.fromEntries(todas.map(f=>[f.nome,{conta_id:f.conta_id||'',taxa_pct:f.taxa_pct,dias:f.dias}])));

  const upd=(nome,k,v)=>setLocal(p=>({...p,[nome]:{...p[nome],[k]:v}}));

  const salvarForma=async(nome)=>{
    setSaving(p=>({...p,[nome]:true}));
    const d=local[nome];
    const existing=formasMap[nome];
    if(existing&&existing.id){
      await sb.from('formas_pagamento').update({conta_id:d.conta_id||null,taxa_pct:parseFloat(d.taxa_pct)||0,dias:parseInt(d.dias)||0}).eq('id',existing.id);
    }else{
      await sb.from('formas_pagamento').insert({user_id:uid,nome,conta_id:d.conta_id||null,taxa_pct:parseFloat(d.taxa_pct)||0,dias:parseInt(d.dias)||0,status:'ativa'});
    }
    toast(nome+' salvo!',false,true);
    setSaving(p=>({...p,[nome]:false}));
    reload();
  };

  const salvarTodas=async()=>{
    for(const nome of Object.keys(local)){
      await salvarForma(nome);
    }
    toast('Todas as formas salvas!',false,true);
    reload();
  };



  return React.createElement(PW,{title:'Formas de Pagamento',sub:'Configure a conta de destino, taxa e prazo para cada forma de pagamento',
    actions:[

          ),

            // Conta destino

              React.createElement(CustomSelect,{

                : 'Sem taxa · Cai em conta em '+(loc.dias||0)+' dia(s)'
            ),
            // Botão salvar
            React.createElement('button',{
              style:{width:'100%',background:isSaved?'#f5f5f5':'#dc2626',color:isSaved?'#555':'#fff',padding:'9px',borderRadius:9,fontSize:13,fontWeight:600,border:'none',cursor:'pointer'},
              onClick:()=>salvarForma(f.nome)

    )
  );
}

// ── APP ──
function App(){
  const[user,setUser]=useState(null);const[page,setPage]=useState('pedidos');
  const[db,setDb]=useState({pedidos:[],pedidos_cw:[],estoque:[],contas:[],receber:[],pagar:[],movs:[],lancamentos:[],categorias_fin:[],centros_custo:[],formas_pag:[]});
  const[modal,setModal]=useState(null);const[col,setCol]=useState(false);const[loading,setLoading]=useState(false);
  const[cfg,setCfg]=useState({cw_token:'',uid:null});

  useEffect(()=>{
    sb.auth.getSession().then(({data:{session}})=>{if(session)setUser(session.user);});
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
    return()=>subscription.unsubscribe();
  },[]);

  const reload=useCallback(async()=>{
    if(!user)return;
    setLoading(true);
    const uid=user.id;
    const[pedcw,ped,est,con,rec,pag,mov,lanc,catfin,centros,formasPag]=await Promise.all([
      sb.from('pedidos_cw').select('*').eq('user_id',uid).order('data_pedido',{ascending:false}).limit(200),
      sb.from('pedidos').select('*').eq('user_id',uid).order('criado_em',{ascending:false}),
      sb.from('estoque').select('*').eq('user_id',uid).order('nome'),
      sb.from('contas_bancarias').select('*').eq('user_id',uid).eq('ativo',true).order('criado_em'),
      sb.from('contas_receber').select('*').eq('user_id',uid).order('criado_em',{ascending:false}),
      sb.from('contas_pagar').select('*').eq('user_id',uid).order('vencimento'),
      sb.from('movimentacoes').select('*').eq('user_id',uid).order('data_movimentacao',{ascending:false}),
      sb.from('lancamentos').select('*').eq('user_id',uid).order('data',{ascending:false}).limit(500),
      sb.from('categorias_fin').select('*').eq('user_id',uid).order('nome'),
      sb.from('centros_custo').select('*').eq('user_id',uid).order('nome'),
      sb.from('formas_pagamento').select('*').eq('user_id',uid).order('nome'),
    ]);
    const contas=con.data||[];
    if(contas.length===0){
      await sb.from('contas_bancarias').insert([
        {user_id:uid,nome:'Nubank PJ',tipo:'Digital',banco:'Nubank',saldo:0,cor:'#8b5cf6',ativo:true},
        {user_id:uid,nome:'Caixa',tipo:'Caixa',banco:'',saldo:0,cor:'#f59e0b',ativo:true},
      ]);
      const{data:nc}=await sb.from('contas_bancarias').select('*').eq('user_id',uid);
      setDb({pedidos:ped.data||[],pedidos_cw:pedcw.data||[],estoque:est.data||[],contas:nc||[],receber:rec.data||[],pagar:pag.data||[],movs:mov.data||[],lancamentos:lanc.data||[],categorias_fin:catfin.data||[],centros_custo:centros.data||[],formas_pag:formasPag.data||[]});
    }else{
      setDb({pedidos:ped.data||[],pedidos_cw:pedcw.data||[],estoque:est.data||[],contas,receber:rec.data||[],pagar:pag.data||[],movs:mov.data||[],lancamentos:lanc.data||[],categorias_fin:catfin.data||[],centros_custo:centros.data||[],formas_pag:formasPag.data||[]});
    }
    // load config
    const{data:cfgRows}=await sb.from('config_usuario').select('*').eq('user_id',uid);
    const cfgMap={};(cfgRows||[]).forEach(r=>{cfgMap[r.chave]=r.valor;});
    setCfg({...cfgMap,cw_token:cfgMap.cw_token||'',uid});
    setLoading(false);
  },[user]);

  useEffect(()=>{if(user)reload();},[user]);

  // Realtime — atualiza pedidos automaticamente quando chega novo pedido
  useEffect(()=>{
    if(!user)return;
    let debounce=null;
    const channel=sb.channel('pedidos_realtime')
      .on('postgres_changes',{
        event:'*',
        schema:'public',
        table:'pedidos_cw',
        filter:'user_id=eq.'+user.id
      },async(payload)=>{
        // Só atualiza pedidos_cw, sem reload completo
        clearTimeout(debounce);
        debounce=setTimeout(async()=>{
          const{data}=await sb.from('pedidos_cw').select('*').eq('user_id',user.id).order('data_pedido',{ascending:false}).limit(200);
          if(data)setDb(prev=>({...prev,pedidos_cw:data}));
          toast('Novo pedido recebido!',false,true);
        },1000);
      })
      .subscribe();
    return()=>{clearTimeout(debounce);sb.removeChannel(channel);};
  },[user]);

  const logout=async()=>{await sb.auth.signOut();setUser(null);};

  if(!user)return React.createElement(React.Fragment,null,React.createElement(Auth,{onLogin:setUser}),React.createElement(Toasts));
  if(loading)return React.createElement('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#f8f8f8',flexDirection:'column',gap:10}},React.createElement(Spin),React.createElement('div',{style:{color:'#bbb',fontSize:13,marginTop:6}},'Carregando...'));

  const uid=user.id;
  const PAGES={
    pedidos:()=>React.createElement(PedidosCW,{uid,db,setDb,reload,setM:setModal,cfg,setCfg}),
    ped_historico:()=>React.createElement(PedHistorico,{uid,db,reload,setM:setModal}),
    ped_mesas:()=>React.createElement(PedMesas,{uid,db,reload,setM:setModal}),
    ped_kds:()=>React.createElement(PedKDS,{uid,db,reload,setM:setModal}),
    ped_caixa:()=>React.createElement(PedCaixa,{uid,db,reload,setM:setModal}),
    estoque:()=>React.createElement(Estoque,{uid,db,reload,setM:setModal}),
    fin_visao:()=>React.createElement(FinVisao,{uid,db,reload,setM:setModal}),
    fin_lancamentos:()=>React.createElement(FinLancamentos,{uid,db,reload,setM:setModal}),
    fin_receber:()=>React.createElement(FinReceber,{uid,db,reload,setM:setModal}),
    fin_pagar:()=>React.createElement(FinPagar,{uid,db,reload,setM:setModal}),
    fin_movs:()=>React.createElement(FinMovs,{uid,db,reload,setM:setModal}),
    fin_contas:()=>React.createElement(FinContas,{uid,db,reload,setM:setModal}),
    fin_categorias:()=>React.createElement(FinCategorias,{uid,db,reload,setM:setModal}),
    fin_centros:()=>React.createElement(FinCentros,{uid,db,reload,setM:setModal}),
    fin_formas:()=>React.createElement(FinFormas,{uid,db,reload,setM:setModal}),
  };
  const PC=PAGES[page]||PAGES.pedidos;

  return React.createElement(React.Fragment,null,
    React.createElement('div',{style:{display:'flex',height:'100vh',background:'#f4f4f5',overflow:'hidden'}},
      React.createElement(Sidebar,{page,setPage,user,logout,col,setCol}),
      React.createElement('main',{style:{flex:1,overflow:'auto',background:'#f4f4f5'}},React.createElement(PC))
    ),
    React.createElement(Modal,{m:modal,close:()=>setModal(null)}),
    React.createElement(Toasts)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
