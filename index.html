function Auth({onLogin}){
  const[email,setEmail]=useState('');const[pass,setPass]=useState('');const[mode,setMode]=useState('login');

  const submit=async()=>{
    setErr('');setLoading(true);
    if(!email||!pass){setErr('Preencha todos os campos');setLoading(false);return;}
    if(mode==='register'){
      if(!name){setErr('Informe seu nome');setLoading(false);return;}
      const{data,error}=await sb.auth.signUp({email,password:pass,options:{data:{name}}});
      if(error){setErr(error.message);setLoading(false);return;}
      toast('Conta criada! Verifique seu e-mail.','success');
    }else{
      const{data,error}=await sb.auth.signInWithPassword({email,password:pass});
      if(error){setErr('E-mail ou senha inválidos');setLoading(false);return;}
      toast('Bem-vindo!','success');
      onLogin(data.user);
    }
    setLoading(false);
  };

      ),

  const{data}=await sb.from('contas_bancarias').select('*').eq('user_id',uid).eq('ativo',true).order('criado_em');
  return data||[];
}
async function loadReceber(uid){

}

  const{data}=await sb.from('movimentacoes').select('*').eq('user_id',uid).order('data_movimentacao',{ascending:false});

// ── DASHBOARD ──
function Dashboard({contas,receber,pagar,movs,setPage}){
  const saldo=contas.reduce((s,c)=>s+Number(c.saldo),0);
  const recMes=movs.filter(m=>m.tipo==='entrada'&&m.data_movimentacao?.slice(0,7)===TODAY().slice(0,7)).reduce((s,m)=>s+Number(m.valor),0);
  const despMes=movs.filter(m=>m.tipo==='saida'&&m.data_movimentacao?.slice(0,7)===TODAY().slice(0,7)).reduce((s,m)=>s+Number(m.valor),0);
  const lucroMes=recMes-despMes;
  const aReceber=receber.filter(r=>r.status==='Pendente').reduce((s,r)=>s+Number(r.valor_bruto),0);
  const aPagar=pagar.filter(p=>p.status==='Pendente').reduce((s,p)=>s+Number(p.valor),0);
  const vencidos=pagar.filter(p=>p.status==='Pendente'&&p.vencimento<TODAY()).length;

  const chartRef=useRef(null);
  useEffect(()=>{
    if(!chartRef.current)return;let c=null;
    try{
      const labels=['Jan','Fev','Mar','Abr','Mai','Jun'];

// ── CONTAS A RECEBER ──
function ContasReceber({uid,contas,receber,reload,setM}){
  const[filtro,setFiltro]=useState('Todos');
  const filtros=['Todos','Pendentes','Recebidos','Hoje','Semana','Mês'];

  const filtered=useMemo(()=>{
    const hoje=TODAY();
    const semana=new Date();semana.setDate(semana.getDate()+7);
    const semStr=semana.toISOString().split('T')[0];
    const mes=hoje.slice(0,7);
    return receber.filter(r=>{
      if(filtro==='Pendentes')return r.status==='Pendente';
      if(filtro==='Recebidos')return r.status==='Recebido';
      if(filtro==='Hoje')return r.data_venda===hoje;
      if(filtro==='Semana')return r.data_prevista>=hoje&&r.data_prevista<=semStr;
      if(filtro==='Mês')return r.data_venda?.slice(0,7)===mes;
      return true;
    });
  },[receber,filtro]);

  const totalPend=receber.filter(r=>r.status==='Pendente').reduce((s,r)=>s+Number(r.valor_bruto),0);
  const totalRec=receber.filter(r=>r.status==='Recebido').reduce((s,r)=>s+Number(r.valor_liquido||r.valor_bruto),0);

  const openNova=()=>setM({title:'Nova Conta a Receber',content:
    React.createElement(ReceberForm,{uid,contas,onSave:async(d)=>{
      const{error}=await sb.from('contas_receber').insert({...d,user_id:uid});
      if(error){toast('Erro: '+error.message,'error');return;}
      toast('Conta a receber criada!','success');reload();setM(null);
    },onCancel:()=>setM(null)})
  });

  const openReceber=(r)=>setM({title:'Confirmar Recebimento',content:
    React.createElement(ConfirmarRecebimentoModal,{uid,r,contas,onConfirm:async(dados)=>{
      const taxa=dados.taxa_valor;
      const liq=dados.valor_liquido;
      // 1. atualizar conta a receber
      await sb.from('contas_receber').update({
        status:'Recebido',data_recebimento:dados.data,
        conta_destino_id:dados.conta_id,
        valor_taxa:taxa,valor_liquido:liq,taxa_pct:dados.taxa_pct,
        observacao:dados.obs
      }).eq('id',r.id);
      // 2. movimentação entrada
      await sb.from('movimentacoes').insert({
        user_id:uid,conta_id:dados.conta_id,tipo:'entrada',
        categoria:'Venda',descricao:'Receb. '+r.pedido_id+' - '+r.cliente,
        valor:liq,origem:'Pedido '+r.pedido_id,origem_id:r.id,
        data_movimentacao:dados.data
      });
      // 3. atualizar saldo conta
      const conta=contas.find(c=>c.id===dados.conta_id);
      if(conta){await sb.from('contas_bancarias').update({saldo:Number(conta.saldo)+liq}).eq('id',dados.conta_id);}
      // 4. despesa taxa se houver
      if(taxa>0){
        await sb.from('movimentacoes').insert({
          user_id:uid,conta_id:dados.conta_id,tipo:'saida',
          categoria:'Taxa Cartão',descricao:'Taxa '+r.pedido_id,
          valor:taxa,origem:'Pedido '+r.pedido_id,origem_id:r.id,
          data_movimentacao:dados.data
        });
        await sb.from('contas_bancarias').update({saldo:Number(conta.saldo)+liq-taxa}).eq('id',dados.conta_id);
      }
      toast('Recebimento confirmado! ✓','success');reload();setM(null);
    },onCancel:()=>setM(null)})
  });

  return React.createElement(PW,{title:'Contas a Receber',sub:'Pedido → Conta a Receber → Recebimento → Bancário',
    actions:[
      React.createElement('button',{key:'sim',style:{...S.ghost,fontSize:12},onClick:()=>{
        // simular pedido Cardápio Web
        const fake={pedido_id:'#'+Math.floor(Math.random()*9000+1000),cliente:'Cliente Teste',valor_bruto:Math.floor(Math.random()*200+30),forma_pagamento:['PIX','Cartão','Dinheiro'][Math.floor(Math.random()*3)]};
        setM({title:'📡 Simular Pedido — Cardápio Web',content:
          React.createElement(SimularPedidoModal,{uid,fake,onSave:async(d)=>{
            const{error}=await sb.from('contas_receber').insert({...d,user_id:uid,origem:'Cardápio Web'});
            if(error){toast('Erro: '+error.message,'error');return;}
            toast('Pedido importado do Cardápio Web!','success');reload();setM(null);
          },onCancel:()=>setM(null)})
        });
      }},'📡 Simular API'),
      React.createElement('button',{key:'n',style:S.btn,onClick:openNova},'+ Lançar Manual')
    ]},
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,marginBottom:24}},
      React.createElement(StatCard,{label:'A Receber',val:FMT(totalPend),color:'#fbbf24',sub:receber.filter(r=>r.status==='Pendente').length+' pendentes'}),
      React.createElement(StatCard,{label:'Recebido no Mês',val:FMT(totalRec),color:'#4ade80'}),
      React.createElement(StatCard,{label:'Total de Registros',val:receber.length})
    ),
    React.createElement('div',{style:{display:'flex',gap:6,marginBottom:18,flexWrap:'wrap'}},
      filtros.map(f=>React.createElement('button',{key:f,onClick:()=>setFiltro(f),style:{
        padding:'7px 16px',borderRadius:20,fontSize:12,fontWeight:600,transition:'all 0.15s',
        background:filtro===f?'#e8293a':'#181818',color:filtro===f?'#fff':'#555',
        border:filtro===f?'1px solid #e8293a':'1px solid #252525'
      }},f))
    ),
    React.createElement('div',{style:S.card},
      React.createElement(Table,{
        cols:['Pedido','Cliente','Valor Bruto','Pagamento','Origem','Data Venda','Previsão','Status',''],
        rows:filtered.map(r=>React.createElement(TR,{key:r.id,cells:[
          React.createElement('span',{style:{fontWeight:700,color:'#e8293a',fontSize:12}},r.pedido_id||'—'),
          React.createElement('span',{style:{fontWeight:600}},r.cliente),
          React.createElement('span',{style:{fontWeight:700}},FMT(r.valor_bruto)),
          r.forma_pagamento,
          React.createElement('span',{style:{fontSize:11,color:'#555'}},r.origem||'Manual'),
          FD(r.data_venda),
          FD(r.data_prevista),
          React.createElement(Badge,{text:r.status}),
          r.status==='Pendente'
            ?React.createElement('button',{style:{...S.btnSm,fontSize:11},onClick:e=>{e.stopPropagation();openReceber(r);}},'Receber')
            :React.createElement('span',{style:{fontSize:11,color:'#4ade80'}},'✓ '+FD(r.data_recebimento))
        ]}))
      })
    )
  );
}

function ContasPagar({uid,contas,pagar,reload,setM}){
  const[filtro,setFiltro]=useState('Todos');
  const hoje=TODAY();
  const mes=hoje.slice(0,7);
  const filtered=pagar.filter(p=>{
    if(filtro==='Pendentes')return p.status==='Pendente';
    if(filtro==='Pagos')return p.status==='Pago';
    if(filtro==='Vencidos')return p.status==='Pendente'&&p.vencimento<hoje;
    if(filtro==='Mês')return p.vencimento?.slice(0,7)===mes;
    return true;
  });
  const totalPend=pagar.filter(p=>p.status==='Pendente').reduce((s,p)=>s+Number(p.valor),0);
  const vencidos=pagar.filter(p=>p.status==='Pendente'&&p.vencimento<hoje);

  const openNova=()=>setM({title:'Nova Conta a Pagar',content:
    React.createElement(PagarForm,{uid,contas,onSave:async(d)=>{
      const{error}=await sb.from('contas_pagar').insert({...d,user_id:uid});
      if(error){toast('Erro: '+error.message,'error');return;}
      toast('Conta a pagar criada!','success');reload();setM(null);
    },onCancel:()=>setM(null)})
  });

  const confirmarPag=(p)=>setM({title:'Confirmar Pagamento',content:
    React.createElement(ConfirmarPagModal,{uid,p,contas,onConfirm:async(contaId,data_pag)=>{
      await sb.from('contas_pagar').update({status:'Pago',data_pagamento:data_pag,conta_pagamento_id:contaId}).eq('id',p.id);
      await sb.from('movimentacoes').insert({user_id:uid,conta_id:contaId,tipo:'saida',categoria:p.categoria,descricao:p.descricao,valor:Number(p.valor),origem:'Conta a Pagar',data_movimentacao:data_pag});
      const conta=contas.find(c=>c.id===contaId);

  return React.createElement(PW,{title:'Contas a Pagar',sub:'Gerencie despesas e compromissos financeiros',

      React.createElement(StatCard,{label:'Vencidos',val:vencidos.length,color:vencidos.length>0?'#f87171':'#4ade80',sub:vencidos.length>0?'⚠ Atenção!':'Nenhum vencido'}),
      React.createElement(StatCard,{label:'Pago no Mês',val:FMT(pagar.filter(p=>p.status==='Pago'&&p.data_pagamento?.slice(0,7)===mes).reduce((s,p)=>s+Number(p.valor),0)),color:'#888'})
    ),

      ['Todos','Pendentes','Vencidos','Pagos','Mês'].map(f=>React.createElement('button',{key:f,onClick:()=>setFiltro(f),style:{padding:'7px 16px',borderRadius:20,fontSize:12,fontWeight:600,background:filtro===f?'#e8293a':'#181818',color:filtro===f?'#fff':'#555',border:filtro===f?'1px solid #e8293a':'1px solid #252525'}},(f==='Vencidos'&&vencidos.length>0?'⚠ ':'')+f+(f==='Vencidos'&&vencidos.length>0?' ('+vencidos.length+')':'')))

// ── FLUXO DE CAIXA ──
function FluxoCaixa({contas,receber,pagar,movs}){
  const[periodo,setPeriodo]=useState('30');
  const saldoAtual=contas.reduce((s,c)=>s+Number(c.saldo),0);
  const hoje=TODAY();
  const futuro=addDays(hoje,parseInt(periodo));
  const entPrev=receber.filter(r=>r.status==='Pendente'&&r.data_prevista>=hoje&&r.data_prevista<=futuro).reduce((s,r)=>s+Number(r.valor_liquido||r.valor_bruto),0);
  const saidPrev=pagar.filter(p=>p.status==='Pendente'&&p.vencimento>=hoje&&p.vencimento<=futuro).reduce((s,p)=>s+Number(p.valor),0);
  const saldoProj=saldoAtual+entPrev-saidPrev;

  const chartRef=useRef(null);
  useEffect(()=>{
    if(!chartRef.current)return;let c=null;
    try{
      // gerar dados dos últimos 7 dias
      const days=Array.from({length:7},(_,i)=>{
        const d=new Date();d.setDate(d.getDate()-6+i);return d.toISOString().split('T')[0];
      });
      const entData=days.map(d=>movs.filter(m=>m.tipo==='entrada'&&m.data_movimentacao===d).reduce((s,m)=>s+Number(m.valor),0));
      const saiData=days.map(d=>movs.filter(m=>m.tipo==='saida'&&m.data_movimentacao===d).reduce((s,m)=>s+Number(m.valor),0));
      c=new Chart(chartRef.current,{type:'line',
        data:{labels:days.map(d=>FD(d)),
          datasets:[
            {label:'Entradas',data:entData,borderColor:'#22c55e',backgroundColor:'rgba(34,197,94,0.06)',fill:true,tension:0.4,pointRadius:4,borderWidth:2},
            {label:'Saídas',data:saiData,borderColor:'#e8293a',backgroundColor:'rgba(232,41,58,0.06)',fill:true,tension:0.4,pointRadius:4,borderWidth:2},
          ]},
        options:{responsive:true,maintainAspectRatio:false,
          plugins:{legend:{labels:{color:'#444',font:{size:10,family:'Poppins'},boxWidth:8,padding:14}},tooltip:{backgroundColor:'rgba(17,17,17,0.95)',titleColor:'#f0f0f0',bodyColor:'#888',borderColor:'#252525',borderWidth:1}},
          scales:{x:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#333',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#333',font:{size:10},callback:v=>'R$'+Number(v).toLocaleString('pt-BR')}}}}
      });
    }catch{}
    return()=>{try{c&&c.destroy()}catch{}};
  },[movs]);

  return React.createElement(PW,{title:'Fluxo de Caixa',sub:'Projeção financeira e histórico de movimentações',
    actions:[
      React.createElement('div',{key:'p',style:{display:'flex',gap:4}},
        ['7','30','90'].map(d=>React.createElement('button',{key:d,onClick:()=>setPeriodo(d),style:{padding:'7px 14px',borderRadius:20,fontSize:12,fontWeight:600,background:periodo===d?'#e8293a':'#181818',color:periodo===d?'#fff':'#555',border:periodo===d?'1px solid #e8293a':'1px solid #252525'}},d+' dias'))
      )
    ]},
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:14,marginBottom:24}},
      React.createElement(StatCard,{label:'Saldo Atual',val:FMT(saldoAtual),color:'#f0f0f0',icon:'🏦'}),
      React.createElement(StatCard,{label:'Entradas Previstas',val:FMT(entPrev),color:'#4ade80',sub:'próximos '+periodo+' dias'}),

    ),
    React.createElement('div',{style:{...S.card,marginBottom:20}},
      React.createElement('div',{style:{fontSize:13,fontWeight:700,color:'#f0f0f0',marginBottom:16}},'Entradas × Saídas — últimos 7 dias'),
      React.createElement('div',{style:{height:260}},React.createElement('canvas',{ref:chartRef}))
    ),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:14}},
      React.createElement('div',{style:S.card},
        React.createElement('div',{style:{fontSize:13,fontWeight:700,color:'#f0f0f0',marginBottom:14}},'Próximos Recebimentos'),
        receber.filter(r=>r.status==='Pendente').slice(0,5).map(r=>
          React.createElement('div',{key:r.id,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'10px 0',borderBottom:'1px solid #161616'}},
            React.createElement('div',null,
              React.createElement('div',{style:{fontSize:13,fontWeight:600,color:'#f0f0f0'}},r.cliente),
              React.createElement('div',{style:{fontSize:11,color:'#444',marginTop:2}},r.pedido_id+' · '+r.forma_pagamento)
            ),
            React.createElement('div',{style:{textAlign:'right'}},
              React.createElement('div',{style:{fontSize:13,fontWeight:700,color:'#4ade80'}},FMT(r.valor_bruto)),
              React.createElement('div',{style:{fontSize:11,color:'#444',marginTop:2}},FD(r.data_prevista))
            )
          )
        ),
        receber.filter(r=>r.status==='Pendente').length===0&&React.createElement('div',{style:{color:'#333',textAlign:'center',padding:'20px 0',fontSize:13}},'Nenhum recebimento pendente')
      ),
      React.createElement('div',{style:S.card},
        React.createElement('div',{style:{fontSize:13,fontWeight:700,color:'#f0f0f0',marginBottom:14}},'Próximas Despesas'),
        pagar.filter(p=>p.status==='Pendente').slice(0,5).map(p=>{

            )

}

// ── DRE ──
function DRE({movs,pagar,receber}){
  const[mesRef,setMesRef]=useState(TODAY().slice(0,7));
  const movMes=movs.filter(m=>m.data_movimentacao?.slice(0,7)===mesRef);
  const recMes=movMes.filter(m=>m.tipo==='entrada'&&m.categoria==='Venda').reduce((s,m)=>s+Number(m.valor),0);
  const recOutros=movMes.filter(m=>m.tipo==='entrada'&&m.categoria!=='Venda').reduce((s,m)=>s+Number(m.valor),0);
  const rb=recMes+recOutros;
  const impostos=rb*0.06;
  const rl=rb-impostos;
  const cmv=rb*0.315;
  const lb=rl-cmv;
  const despOp=movMes.filter(m=>m.tipo==='saida'&&!['Taxa Cartão','Impostos'].includes(m.categoria)).reduce((s,m)=>s+Number(m.valor),0);
  const despFin=movMes.filter(m=>m.tipo==='saida'&&m.categoria==='Taxa Cartão').reduce((s,m)=>s+Number(m.valor),0);
  const lo=lb-despOp;
  const ll=lo-despFin;

  const DR=(label,val,type='normal',indent=false)=>{
    const isNeg=type==='sub';const isRes=type==='result';
    return React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px '+(indent?'28px':'16px'),borderBottom:'1px solid #141414',background:isRes?'rgba(232,41,58,0.04)':'transparent'}},
      React.createElement('span',{style:{fontSize:13,color:isNeg?'#555':isRes?'#f0f0f0':'#ccc',fontStyle:isNeg?'normal':'normal'}},label),
      React.createElement('span',{style:{fontSize:isRes?15:13,fontWeight:isRes?800:600,color:isNeg?'#f87171':type==='pos'?'#4ade80':isRes?(val>=0?'#4ade80':'#f87171'):'#f0f0f0'}},
        (isNeg?'- ':isRes?'= ':'')+FMT(Math.abs(val))
      )
    );
  };

  const chartRef=useRef(null);
  useEffect(()=>{
    if(!chartRef.current)return;let c=null;
    try{
      const meses=['Jan','Fev','Mar','Abr','Mai','Jun'];
      const lucros=[-800,2100,500,3200,1900,ll];
      c=new Chart(chartRef.current,{type:'bar',
        data:{labels:meses,datasets:[{data:lucros,backgroundColor:lucros.map(v=>v>=0?'rgba(34,197,94,0.7)':'rgba(232,41,58,0.7)'),borderRadius:8,borderSkipped:false}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
          scales:{x:{grid:{display:false},ticks:{color:'#333',font:{size:10}}},y:{grid:{color:'rgba(255,255,255,0.04)'},ticks:{color:'#333',font:{size:10}}}}}
      });
    }catch{}
    return()=>{try{c&&c.destroy()}catch{}};
  },[ll,mesRef]);

  const meses=Array.from({length:6},(_,i)=>{const d=new Date();d.setMonth(d.getMonth()-5+i);return{v:d.toISOString().slice(0,7),l:d.toLocaleDateString('pt-BR',{month:'short',year:'numeric'})};});

  return React.createElement(PW,{title:'DRE',sub:'Demonstração do Resultado do Exercício',
    actions:[
      React.createElement('select',{key:'m',style:{...S.sel,width:'auto',marginBottom:0,padding:'8px 14px',fontSize:12},value:mesRef,onChange:e=>setMesRef(e.target.value)},
        meses.map(m=>React.createElement('option',{key:m.v,value:m.v},m.l))
      )
    ]},
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}},
      React.createElement('div',{style:S.card},
        React.createElement('div',{style:{fontSize:13,fontWeight:700,color:'#f0f0f0',marginBottom:16,paddingBottom:14,borderBottom:'1px solid #1a1a1a'}},'Resultado — '+new Date(mesRef+'-01').toLocaleDateString('pt-BR',{month:'long',year:'numeric'})),
        DR('Receita Bruta de Vendas',rb,'pos'),
        DR('(-) Impostos (6%)',-impostos,'sub'),
        DR('= Receita Líquida',rl,'result'),
        React.createElement('div',{style:{height:8}}),
        DR('(-) CMV (31.5%)',-cmv,'sub'),
        DR('= Lucro Bruto',lb,'result'),
        React.createElement('div',{style:{height:8}}),
        DR('(-) Despesas Operacionais',-despOp,'sub'),
        DR('= Lucro Operacional',lo,'result'),
        React.createElement('div',{style:{height:8}}),
        DR('(-) Despesas Financeiras',-despFin,'sub'),
        DR('= Lucro Líquido',ll,'result'),
        React.createElement('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:10,marginTop:16}},
          [['Mg. Bruta',rb?((lb/rb)*100).toFixed(1):0,lb>=0],['Mg. Operacional',rb?((lo/rb)*100).toFixed(1):0,lo>=0],['Mg. Líquida',rb?((ll/rb)*100).toFixed(1):0,ll>=0]].map(([l,v,ok])=>
            React.createElement('div',{key:l,style:{background:'#0d0d0d',borderRadius:10,padding:'12px',textAlign:'center'}},
              React.createElement('div',{style:{fontSize:10,color:'#333',fontWeight:600,letterSpacing:'1px',textTransform:'uppercase',marginBottom:4}},l),
              React.createElement('div',{style:{fontSize:18,fontWeight:800,color:ok?'#4ade80':'#f87171'}},FP(v))
            )
          )
        )
      ),
      React.createElement('div',{style:{display:'flex',flexDirection:'column',gap:14}},
        React.createElement('div',{style:{...S.card,flex:1}},
          React.createElement('div',{style:{fontSize:13,fontWeight:700,color:'#f0f0f0',marginBottom:14}},'Evolução do Lucro Líquido'),
          React.createElement('div',{style:{height:220}},React.createElement('canvas',{ref:chartRef}))
        ),
        React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}},
          React.createElement(StatCard,{label:'Receita Bruta',val:FMT(rb),color:'#f0f0f0'}),
          React.createElement(StatCard,{label:'Lucro Líquido',val:FMT(ll),color:ll>=0?'#4ade80':'#f87171'})
        )
      )
    )
  );
}

// ── APP ──
function App(){
  const[user,setUser]=useState(null);
  const[page,setPage]=useState('dashboard');
  const[contas,setContas]=useState([]);
  const[receber,setReceber]=useState([]);
  const[pagar,setPagar]=useState([]);
  const[movs,setMovs]=useState([]);
  const[modal,setModal]=useState(null);
  const[collapsed,setCollapsed]=useState(false);
  const[loadingData,setLoadingData]=useState(false);

  useEffect(()=>{
    // check session
    sb.auth.getSession().then(({data:{session}})=>{
      if(session)setUser(session.user);
    });
    const{data:{subscription}}=sb.auth.onAuthStateChange((_,s)=>setUser(s?.user||null));
    return()=>subscription.unsubscribe();
  },[]);

  const reloadAll=useCallback(async()=>{
    if(!user)return;
    setLoadingData(true);
    const[c,r,p,m]=await Promise.all([loadContas(user.id),loadReceber(user.id),loadPagar(user.id),loadMovs(user.id)]);
    setContas(c);setReceber(r);setPagar(p);setMovs(m);
    // seed contas se vazias
    if(c.length===0){
      const seeds=[
        {user_id:user.id,nome:'Nubank PJ',tipo:'Digital',banco:'Nubank',saldo:0,cor:'#8b5cf6',ativo:true},
        {user_id:user.id,nome:'Stone',tipo:'Maquininha',banco:'Stone',saldo:0,cor:'#22c55e',ativo:true},
        {user_id:user.id,nome:'Caixa da Empresa',tipo:'Caixa',banco:'',saldo:0,cor:'#f59e0b',ativo:true},
      ];
      await sb.from('contas_bancarias').insert(seeds);
      const{data:nc}=await sb.from('contas_bancarias').select('*').eq('user_id',user.id);
      setContas(nc||[]);
    }
    setLoadingData(false);
  },[user]);

  useEffect(()=>{if(user)reloadAll();},[user]);

  const onLogout=async()=>{await sb.auth.signOut();setUser(null);};

  if(!user)return React.createElement(React.Fragment,null,React.createElement(Auth,{onLogin:setUser}),React.createElement(Toasts));

  if(loadingData)return React.createElement('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0a0a0a',flexDirection:'column',gap:12}},
    React.createElement(Spin),
    React.createElement('div',{style:{color:'#444',fontSize:13,marginTop:8}},'Carregando dados...')
  );

  const PAGES={
    dashboard:()=>React.createElement(Dashboard,{contas,receber,pagar,movs,setPage}),
    recebimentos:()=>React.createElement(ContasReceber,{uid:user.id,contas,receber,reload:reloadAll,setM:setModal}),
    pagar:()=>React.createElement(ContasPagar,{uid:user.id,contas,pagar,reload:reloadAll,setM:setModal}),
    movimentacoes:()=>React.createElement(Movimentacoes,{uid:user.id,contas,movs,reload:reloadAll,setM:setModal}),
    contas:()=>React.createElement(ContasBancarias,{uid:user.id,contas,reload:reloadAll,setM:setModal}),
    fluxo:()=>React.createElement(FluxoCaixa,{contas,receber,pagar,movs}),
    dre:()=>React.createElement(DRE,{movs,pagar,receber}),
  };
  const PC=PAGES[page]||PAGES.dashboard;

  return React.createElement(React.Fragment,null,
    React.createElement('div',{style:{display:'flex',height:'100vh',background:'#0a0a0a',overflow:'hidden'}},
      React.createElement(Sidebar,{page,setPage,user,onLogout,collapsed,setCollapsed}),
      React.createElement('main',{style:{flex:1,overflow:'auto',background:'#0d0d0d'}},React.createElement(PC))
    ),
    React.createElement(Modal,{m:modal,onClose:()=>setModal(null)}),
    React.createElement(Toasts)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
