// ── TOAST ──
let _setToasts=null;
function Toasts(){
  const[t,st]=useState([]);_setToasts=st;
  return React.createElement('div',{style:{position:'fixed',bottom:24,right:24,zIndex:9999,display:'flex',flexDirection:'column',gap:8,pointerEvents:'none'}},
    t.map(x=>React.createElement('div',{key:x.id,style:{
      background:x.type==='error'?'#e8293a':x.type==='success'?'#16a34a':'#e8293a',
      color:'#fff',padding:'11px 18px',borderRadius:12,fontSize:13,fontWeight:500,
      boxShadow:'0 8px 32px rgba(0,0,0,0.5)',minWidth:240,animation:'slideIn 0.25s ease',
    }},x.msg))
  );
}
const toast=(msg,type='info')=>{
  if(!_setToasts)return;
  const id=Date.now();
  _setToasts(p=>[...p,{id,msg,type}]);
  setTimeout(()=>_setToasts(p=>p.filter(x=>x.id!==id)),3000);
};

// ── MODAL ──
function Modal({m,onClose}){
  if(!m)return null;
  return React.createElement('div',{
    onClick:e=>e.target===e.currentTarget&&onClose(),
    style:{position:'fixed',inset:0,background:'rgba(0,0,0,0.75)',backdropFilter:'blur(6px)',zIndex:500,display:'flex',alignItems:'center',justifyContent:'center',padding:16}
  },
    React.createElement('div',{style:{background:'#111',border:'1px solid #252525',borderRadius:22,width:'100%',maxWidth:500,maxHeight:'88vh',overflow:'auto',boxShadow:'0 32px 80px rgba(0,0,0,0.8)',animation:'fadeUp 0.25s ease'}},
      React.createElement('div',{style:{padding:'20px 24px',borderBottom:'1px solid #1a1a1a',display:'flex',alignItems:'center',justifyContent:'space-between'}},
        React.createElement('h3',{style:{fontSize:16,fontWeight:700,color:'#f0f0f0'}},m.title),
        React.createElement('button',{onClick:onClose,style:{width:30,height:30,borderRadius:10,background:'#1a1a1a',color:'#888',fontSize:18,display:'flex',alignItems:'center',justifyContent:'center'}},'×')
      ),
      React.createElement('div',{style:{padding:'22px 24px'}},m.content)
    )
  );
}

// ── AUTH ──
function Auth({onLogin}){
  const[mode,setMode]=useState('login');
  const[name,setName]=useState('');const[email,setEmail]=useState('');const[pass,setPass]=useState('');
  const[err,setErr]=useState('');const[loading,setLoading]=useState(false);

  const submit=()=>{
    setErr('');setLoading(true);
    if(!email||!pass){setErr('Preencha todos os campos');setLoading(false);return;}
    let users=dbGet('users')||[];
    if(mode==='register'){
      if(!name){setErr('Informe seu nome');setLoading(false);return;}
      if(users.find(u=>u.email===email)){setErr('E-mail já cadastrado');setLoading(false);return;}
      const u={id:Date.now()+'',name,email,pass,at:new Date().toISOString()};
      dbSet('users',[...users,u]);dbSet('d:'+u.id,SEED);
      toast('Conta criada!','success');onLogin(u);
    }else{
      const u=users.find(x=>x.email===email&&x.pass===pass);
      if(!u){setErr('E-mail ou senha inválidos');setLoading(false);return;}
      toast('Bem-vindo, '+u.name+'!','success');onLogin(u);
    }
    setLoading(false);
  };

  const inp={
    width:'100%',background:'#181818',border:'1px solid #252525',borderRadius:12,
    padding:'12px 15px',fontSize:14,color:'#f0f0f0',marginBottom:14,
    transition:'border-color 0.2s',
  };

  return React.createElement('div',{style:{minHeight:'100vh',background:'#0a0a0a',display:'flex',alignItems:'center',justifyContent:'center',padding:16,position:'relative',overflow:'hidden'}},
    // bg glow
    React.createElement('div',{style:{position:'absolute',width:600,height:600,borderRadius:'50%',background:'radial-gradient(circle,rgba(232,41,58,0.08) 0%,transparent 70%)',top:'50%',left:'50%',transform:'translate(-50%,-50%)',pointerEvents:'none'}}),
    // card
    React.createElement('div',{style:{position:'relative',zIndex:2,background:'#111',border:'1px solid #252525',borderRadius:28,padding:'44px 40px',width:'100%',maxWidth:400,boxShadow:'0 40px 100px rgba(0,0,0,0.8)',animation:'fadeUp 0.4s ease'}},
      // logo
      React.createElement('div',{style:{textAlign:'center',marginBottom:36}},
        React.createElement('div',{style:{width:60,height:60,background:'linear-gradient(135deg,#e8293a,#c41f2e)',borderRadius:20,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px',fontSize:26,boxShadow:'0 8px 30px rgba(232,41,58,0.4)',animation:'pulse 2s infinite'}},'🍪'),
        React.createElement('div',{style:{fontSize:26,fontWeight:800,color:'#f0f0f0',letterSpacing:'-0.5px'}},'Vulpin'),
        React.createElement('div',{style:{fontSize:11,color:'#555',marginTop:4,letterSpacing:'2px',textTransform:'uppercase'}})
      ),
      // tabs
      React.createElement('div',{style:{display:'flex',background:'#181818',borderRadius:12,padding:3,marginBottom:26}},
        ['login','register'].map(m=>React.createElement('button',{key:m,onClick:()=>{setMode(m);setErr('');},style:{flex:1,padding:'9px',borderRadius:10,fontSize:13,fontWeight:600,transition:'all 0.2s',background:mode===m?'#e8293a':'transparent',color:mode===m?'#fff':'#555',boxShadow:mode===m?'0 4px 16px rgba(232,41,58,0.3)':'none'}},m==='login'?'Entrar':'Criar conta'))
      ),
      err&&React.createElement('div',{style:{background:'rgba(232,41,58,0.1)',border:'1px solid rgba(232,41,58,0.3)',borderRadius:10,padding:'10px 14px',fontSize:13,color:'#e8293a',marginBottom:14}},err),
      mode==='register'&&React.createElement('div',null,
        React.createElement('div',{style:{fontSize:10,color:'#555',fontWeight:600,letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:6}},'Nome'),
        React.createElement('input',{style:inp,type:'text',placeholder:'Seu nome',value:name,onChange:e=>setName(e.target.value)})
      ),
      React.createElement('div',{style:{fontSize:10,color:'#555',fontWeight:600,letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:6}},'E-mail'),
      React.createElement('input',{style:inp,type:'email',placeholder:'seu@email.com',value:email,onChange:e=>setEmail(e.target.value)}),
      React.createElement('div',{style:{fontSize:10,color:'#555',fontWeight:600,letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:6}},'Senha'),
      React.createElement('input',{style:{...inp,marginBottom:22},type:'password',placeholder:'••••••••',value:pass,onChange:e=>setPass(e.target.value),onKeyDown:e=>e.key==='Enter'&&submit()}),
      React.createElement('button',{
        style:{width:'100%',padding:'13px',background:'linear-gradient(135deg,#e8293a,#c41f2e)',borderRadius:12,color:'#fff',fontSize:14,fontWeight:700,boxShadow:'0 4px 20px rgba(232,41,58,0.35)',transition:'all 0.2s'},
        onClick:submit
      },loading?'Aguarde...':(mode==='login'?'Entrar na plataforma':'Criar minha conta'))
    )
  );
}

const C={

const BMAP={
  red:{bg:'rgba(232,41,58,0.12)',c:'#ff4d5e',b:'rgba(232,41,58,0.25)'},
  green:{bg:'rgba(34,197,94,0.1)',c:'#4ade80',b:'rgba(34,197,94,0.25)'},

const SMAP={'Entregue':'green','Concluído':'green','OK':'green','Em preparo':'blue','Em andamento':'blue','Aguardando':'amber','Pendente':'amber','Cancelado':'red','Crítico':'red','Vencido':'red','Vencendo':'amber'};

function Badge({text,color}){
  const bc=BMAP[color||SMAP[text]||'gray'];
  return React.createElement('span',{style:{display:'inline-flex',alignItems:'center',padding:'4px 10px',borderRadius:20,fontSize:11,fontWeight:700,background:bc.bg,color:bc.c,border:`1px solid ${bc.b}`,whiteSpace:'nowrap'}},text);
}

function Stat({label,val,sub,color,change}){
  return React.createElement('div',{style:C.stat},
    React.createElement('div',{style:{fontSize:10,color:'#444',fontWeight:600,letterSpacing:'1.5px',textTransform:'uppercase',marginBottom:10}},label),
    React.createElement('div',{style:{fontSize:22,fontWeight:800,color:color||'#f0f0f0',letterSpacing:'-0.5px',lineHeight:1}},val),
    (sub||change)&&React.createElement('div',{style:{marginTop:8,fontSize:12,color:change?(change.startsWith('+')?'#4ade80':'#f87171'):'#555'}},change||sub)
  );
}

function Table({cols,rows,empty}){

function PW({title,sub,actions,children}){
  return React.createElement('div',{style:{padding:'28px',animation:'fadeUp 0.25s ease'}},

// ── PEDIDOS ──
function pedTotal(p){return p.itens.reduce((s,i)=>s+(i.preco*i.qty),0);}

function Pedidos({data,save,setM}){
  const[filtro,setFiltro]=useState('Todos');
  const statuses=['Todos','Aguardando','Em preparo','Entregue','Cancelado'];
  const filtered=filtro==='Todos'?data.pedidos:data.pedidos.filter(p=>p.status===filtro);

  const openNovo=()=>{
    let cli='',pag='PIX',obs='',itens=[{produto:'Cookie Nutella',qty:1,preco:18.90}];
    setM({title:'Novo Pedido',content:React.createElement(PedidoForm,{data,save,setM,initial:{cli,pag,obs,itens}})});
  };

  const openVer=(p)=>setM({title:'Pedido '+p.id,content:
    React.createElement('div',null,
      React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}},
        [['Cliente',p.cliente],['Data',FD(p.data)],['Pagamento',p.pagamento],['Status',p.status]].map(([l,v])=>
          React.createElement('div',{key:l,style:{background:'#181818',borderRadius:12,padding:'12px 14px'}},
            React.createElement('div',{style:{fontSize:10,color:'#444',fontWeight:600,letterSpacing:'1px',textTransform:'uppercase',marginBottom:4}},l),
            React.createElement('div',{style:{fontSize:14,fontWeight:600,color:'#f0f0f0'}},l==='Status'?React.createElement(Badge,{text:v}):v)
          )
        )
      ),
      React.createElement('div',{style:{background:'#181818',borderRadius:14,padding:'14px',marginBottom:14}},
        React.createElement('div',{style:{fontSize:11,color:'#e8293a',fontWeight:700,letterSpacing:'1px',textTransform:'uppercase',marginBottom:10}},'Itens do Pedido'),
        p.itens.map((it,i)=>React.createElement('div',{key:i,style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 0',borderBottom:i<p.itens.length-1?'1px solid #222':'none'}},
          React.createElement('span',{style:{fontSize:13,color:'#ccc'}},it.produto+' × '+it.qty),
          React.createElement('span',{style:{fontSize:13,fontWeight:700,color:'#f0f0f0'}},FMT(it.preco*it.qty))
        )),
        React.createElement('div',{style:{display:'flex',justifyContent:'space-between',marginTop:12,paddingTop:12,borderTop:'1px solid #222'}},
          React.createElement('span',{style:{fontWeight:700,color:'#f0f0f0'}},'Total'),
          React.createElement('span',{style:{fontWeight:800,fontSize:17,color:'#e8293a'}},FMT(pedTotal(p)))
        )
      ),
      p.obs&&React.createElement('div',{style:{background:'#181818',borderRadius:12,padding:'12px 14px',marginBottom:14,fontSize:13,color:'#888'}},'📝 '+p.obs),
      React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',flexWrap:'wrap'}},
        p.status==='Aguardando'&&React.createElement('button',{style:{...C.btnSm,background:'#16a34a',boxShadow:'none'},onClick:()=>{
          const np=data.pedidos.map(x=>x.id===p.id?{...x,status:'Em preparo'}:x);
          save({...data,pedidos:np});toast('Status atualizado!','success');setM(null);
        }},'Iniciar preparo'),
        p.status==='Em preparo'&&React.createElement('button',{style:{...C.btnSm,background:'#16a34a',boxShadow:'none'},onClick:()=>{
          // baixar estoque
          const itensNomes=p.itens.map(i=>i.produto);

          React.createElement('div',{style:{fontSize:26,fontWeight:800,color:'#f0f0f0',letterSpacing:'-0.5px'}},FMT(c.saldo)),
          React.createElement('div',{style:{display:'flex',gap:8,marginTop:14}},
            React.createElement('button',{style:{...C.ghostSm,fontSize:11},onClick:()=>{
              const v=prompt('Valor para depositar (R$):');
              if(!v)return;
              const nc=data.contas.map(x=>x.id===c.id?{...x,saldo:x.saldo+parseFloat(v)}:x);
              save({...data,contas:nc});toast('Depósito registrado!','success');
            }},'+ Depósito'),
            React.createElement('button',{style:{...C.ghostSm,fontSize:11,color:'#e8293a'},onClick:()=>{
              const v=prompt('Valor para retirar (R$):');
              if(!v)return;
              const nc=data.contas.map(x=>x.id===c.id?{...x,saldo:Math.max(0,x.saldo-parseFloat(v))}:x);
              save({...data,contas:nc});toast('Retirada registrada!','success');
            }},'− Retirada')
          )
        ))
      )
    )
  );
}

function MovFinForm({tipo,data,save,setM}){
  const[desc,setDesc]=useState('');const[cat,setCat]=useState(tipo==='entrada'?'Vendas':'Aluguel');
  const[conta,setConta]=useState(data.contas[0]?.nome||'');const[val,setVal]=useState('');const[dt,setDt]=useState(TODAY());
  return React.createElement('div',null,
    React.createElement('label',{style:C.label},'Descrição'),
    React.createElement('input',{style:C.inp,placeholder:'Descrição...',value:desc,onChange:e=>setDesc(e.target.value)}),
    React.createElement('div',{style:{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}},
      React.createElement('div',null,
        React.createElement('label',{style:C.label},'Categoria'),
        React.createElement('select',{style:C.sel,value:cat,onChange:e=>setCat(e.target.value)},
          (tipo==='entrada'?['Vendas','Outros']:['Aluguel','Salários','Energia','Marketing','Matéria-Prima','Manutenção','Contador','Internet']).map(x=>React.createElement('option',{key:x,value:x},x))
        )
      ),
      React.createElement('div',null,
        React.createElement('label',{style:C.label},'Conta'),
        React.createElement('select',{style:C.sel,value:conta,onChange:e=>setConta(e.target.value)},data.contas.map(c=>React.createElement('option',{key:c.nome,value:c.nome},c.nome)))
      ),
      React.createElement('div',null,React.createElement('label',{style:C.label},'Valor (R$)'),React.createElement('input',{style:C.inp,type:'number',step:'0.01',placeholder:'0.00',value:val,onChange:e=>setVal(e.target.value)})),
      React.createElement('div',null,React.createElement('label',{style:C.label},'Data'),React.createElement('input',{style:C.inp,type:'date',value:dt,onChange:e=>setDt(e.target.value)})),
    ),
    React.createElement('div',{style:{display:'flex',gap:8,justifyContent:'flex-end',marginTop:4}},
      React.createElement('button',{style:C.ghost,onClick:()=>setM(null)},'Cancelar'),
      React.createElement('button',{style:C.btn,onClick:()=>{
        if(!desc||!val){toast('Preencha todos os campos','error');return;}
        const v=parseFloat(val);
        const nm={id:Date.now(),desc,cat,tipo,valor:v,data:dt,conta};
        const nc=data.contas.map(c=>c.nome===conta?{...c,saldo:tipo==='entrada'?c.saldo+v:c.saldo-v}:c);
        save({...data,movs:[...data.movs,nm],contas:nc});
        toast((tipo==='entrada'?'Receita':'Despesa')+' registrada!','success');setM(null);
      }},'Salvar')
    )
  );
}

// ── SIDEBAR ──
const MODULOS=[
  {id:'pedidos',label:'Gestão de Pedidos',icon:'🛍',desc:'Pedidos e entregas'},
  {id:'estoque',label:'Estoque',icon:'📦',desc:'Inventário e insumos'},
  {id:'financeiro',label:'Financeiro',icon:'💰',desc:'Caixa e movimentações'},
];

function Sidebar({page,setPage,user,setUser,collapsed,setCollapsed}){
  const W=collapsed?70:240;
  return React.createElement('aside',{style:{
    width:W,minWidth:W,background:'#0d0d0d',
    borderRight:'1px solid #1a1a1a',
    display:'flex',flexDirection:'column',height:'100vh',
    transition:'width 0.3s cubic-bezier(0.4,0,0.2,1)',
    overflow:'hidden',flexShrink:0,position:'relative',zIndex:10,
    borderRadius:'0 20px 20px 0',
  }},
    // logo
    React.createElement('div',{style:{padding:'20px 16px 18px',borderBottom:'1px solid #1a1a1a',display:'flex',alignItems:'center',gap:10,justifyContent:collapsed?'center':'flex-start'}},
      React.createElement('div',{style:{width:36,height:36,background:'linear-gradient(135deg,#e8293a,#c41f2e)',borderRadius:12,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,flexShrink:0,boxShadow:'0 4px 16px rgba(232,41,58,0.35)'}},'🍪'),
      !collapsed&&React.createElement('span',{style:{fontSize:18,fontWeight:800,color:'#f0f0f0',letterSpacing:'-0.3px',whiteSpace:'nowrap'}},'Vulpin')
    ),
    // módulos
    React.createElement('nav',{style:{flex:1,padding:'16px 10px',display:'flex',flexDirection:'column',gap:4,overflowY:'auto'}},
      !collapsed&&React.createElement('div',{style:{fontSize:9,color:'#333',fontWeight:700,letterSpacing:'2px',textTransform:'uppercase',padding:'0 6px 10px'}},'Módulos'),
      MODULOS.map(m=>React.createElement('button',{
        key:m.id,onClick:()=>setPage(m.id),
        title:collapsed?m.label:'',
        style:{
          display:'flex',alignItems:'center',gap:collapsed?0:10,
          padding:collapsed?'12px':'11px 12px',
          borderRadius:14,
          justifyContent:collapsed?'center':'flex-start',
          color:page===m.id?'#fff':'#555',
          background:page===m.id?'linear-gradient(135deg,rgba(232,41,58,0.9),rgba(196,31,46,0.9))':'transparent',
          border:page===m.id?'1px solid rgba(232,41,58,0.5)':'1px solid transparent',
          transition:'all 0.15s',
          boxShadow:page===m.id?'0 4px 20px rgba(232,41,58,0.25)':'none',
          width:'100%',
        }
      },
        React.createElement('span',{style:{fontSize:collapsed?20:16,lineHeight:1,flexShrink:0}},m.icon),
        !collapsed&&React.createElement('div',{style:{textAlign:'left',minWidth:0}},
          React.createElement('div',{style:{fontSize:13,fontWeight:600,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}},m.label),
          React.createElement('div',{style:{fontSize:10,color:page===m.id?'rgba(255,255,255,0.6)':'#333',marginTop:1}},m.desc)
        )
      ))
    ),
    // collapse button
    React.createElement('div',{style:{padding:'12px 10px',borderTop:'1px solid #1a1a1a',display:'flex',justifyContent:collapsed?'center':'space-between',alignItems:'center'}},
      !collapsed&&React.createElement('div',{style:{display:'flex',alignItems:'center',gap:8,minWidth:0}},
        React.createElement('div',{style:{width:30,height:30,borderRadius:10,background:'rgba(232,41,58,0.15)',border:'1px solid rgba(232,41,58,0.25)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:'#e8293a',flexShrink:0}},user.name.slice(0,2).toUpperCase()),
        React.createElement('div',{style:{minWidth:0}},
          React.createElement('div',{style:{fontSize:12,fontWeight:600,color:'#f0f0f0',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis',maxWidth:130}},user.name),
          React.createElement('button',{onClick:()=>setUser(null),style:{fontSize:10,color:'#555',padding:0,background:'none',border:'none',cursor:'pointer'}},'Sair')
        )
      ),
      React.createElement('button',{
        onClick:()=>setCollapsed(c=>!c),
        title:collapsed?'Expandir':'Recolher',
        style:{width:32,height:32,borderRadius:10,background:'#181818',border:'1px solid #252525',color:'#555',fontSize:16,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.2s'}
      },collapsed?'›':'‹')
    )
  );
}

// ── APP ──
function App(){
  const[user,setUser]=useState(null);
  const[page,setPage]=useState('pedidos');
  const[data,setData]=useState(null);
  const[modal,setModal]=useState(null);
  const[collapsed,setCollapsed]=useState(false);

  useEffect(()=>{
    if(!user)return;
    let d=dbGet('d:'+user.id);
    if(!d){d={...SEED};dbSet('d:'+user.id,d);}
    setData(d);
  },[user]);

  const save=useCallback(nd=>{setData(nd);dbSet('d:'+user.id,nd);},[user]);
  const setU=u=>{setUser(u);setData(null);};

  if(!user)return React.createElement(React.Fragment,null,React.createElement(Auth,{onLogin:setU}),React.createElement(Toasts));
  if(!data)return React.createElement('div',{style:{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0a0a0a',color:'#e8293a',fontSize:16,fontWeight:600}},'Carregando...');

  const PAGES={pedidos:Pedidos,estoque:Estoque,financeiro:Financeiro};
  const PC=PAGES[page]||Pedidos;

  return React.createElement(React.Fragment,null,
    React.createElement('div',{style:{display:'flex',height:'100vh',background:'#0a0a0a',overflow:'hidden'}},
      React.createElement(Sidebar,{page,setPage,user,setUser:setU,collapsed,setCollapsed}),
      React.createElement('main',{style:{flex:1,overflow:'auto',background:'#0d0d0d'}},
        React.createElement(PC,{data,save,setM:setModal,user})
      )
    ),
    React.createElement(Modal,{m:modal,onClose:()=>setModal(null)}),
    React.createElement(Toasts)
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
